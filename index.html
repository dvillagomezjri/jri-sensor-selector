<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JRI Smart Selector v1.6</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
  <style>
    :root { --jri-blue: #005596; --jri-green: #4CAF50; --bg: #f4f6f8; --nova: #ff9800; --nano: #2196f3; --lora: #673ab7; --legacy: #9e9e9e; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #333; }
    .container { max-width: 1300px; margin: auto; padding: 20px; }
    .dashboard { display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
    .controls, .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    
    .recommendation-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
    .card.highlight { border-top: 6px solid var(--jri-green); position: relative; }
    
    .tech-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; color: white; margin-bottom: 8px; }
    .tag-nova { background: var(--nova); }
    .tag-nano { background: var(--nano); }
    .tag-lora { background: var(--lora); }
    .tag-legacy { background: var(--legacy); }

    .legacy-warning { color: #d32f2f; font-size: 0.75rem; font-weight: bold; margin-top: 5px; background: #ffebee; padding: 5px; border-radius: 4px; border: 1px solid #ffcdd2; }

    .breakdown { font-size: 0.85rem; background: #fdfdfd; padding: 12px; border-radius: 6px; margin-top: 10px; border: 1px solid #eee; }
    .breakdown-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .ref-text { color: #777; font-family: 'Courier New', monospace; font-size: 0.8rem; }
    .total-row { border-top: 2px solid var(--jri-blue); padding-top: 8px; font-weight: bold; color: var(--jri-blue); font-size: 1rem; }
    
    input, select, textarea { width: 100%; padding: 10px; margin: 8px 0 15px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; background: var(--jri-blue); color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    h3 { margin-top: 0; color: var(--jri-blue); border-bottom: 1px solid #eee; padding-bottom: 10px; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1 style="color: var(--jri-blue);">JRI Smart Sensor Selector</h1>
    <p>v1.6 | Full Catalog + Legacy Support (Ref 13491)</p>
  </header>

  <div class="dashboard">
    <div class="controls">
      <h3>Search Filters</h3>
      <label>Temperature Range (°C)</label>
      <div style="display:flex; gap:10px;">
        <input type="number" id="minTemp" value="2">
        <input type="number" id="maxTemp" value="8">
      </div>

      <label>Humidity Required?</label>
      <select id="humidity">
        <option value="no">No</option>
        <option value="yes">Yes</option>
      </select>

      <label>Technology Stack</label>
      <select id="tech">
        <option value="any">Compare All Technologies</option>
        <option value="nova">Nova SPY (Industrial)</option>
        <option value="nano">Nano SPY (Compact)</option>
        <option value="lora">LoRa SPY (Long Range)</option>
      </select>

      <label>Include Discontinued/Legacy Models?</label>
      <select id="includeLegacy">
        <option value="yes">Yes (Show Ref 13491)</option>
        <option value="no">No (New Sales Only)</option>
      </select>

      <button onclick="search()">Update Search</button>
      <button style="margin-top:10px; background:#607d8b;" onclick="exportPDF()">Export PDF Quote</button>
    </div>

    <div id="main-display">
      <div id="export-area">
        <h3>⭐ Best Match Systems</h3>
        <div id="recommendations" class="recommendation-grid"></div>

        <h3>📋 Full Catalog Results</h3>
        <div id="results"></div>
      </div>
    </div>
  </div>
</div>

<script>
// 🔬 DATA CATALOG
const probes = [
  {ref:"13912", name:"Digital Sensor T° Short (Ambient)", min:-40, max:80, acc:"±0.2°C", score:9, price: 63.00, hum:false},
  {ref:"13993", name:"Digital Sensor T° Long (3m Flat Cable)", min:-40, max:80, acc:"±0.2°C", score:9, price: 80.00, hum:false},
  {ref:"14129", name:"Reference Digital Sensor T° Short", min:-40, max:80, acc:"±0.15°C", score:10, price: 140.00, hum:false},
  {ref:"13947", name:"Reference Digital Sensor T° (3m Cable)", min:-90, max:200, acc:"±0.15°C", score:10, price: 188.00, hum:false},
  {ref:"13984", name:"Low Temp Digital Sensor (3m Cable)", min:-200, max:0, acc:"±0.5°C", score:8, price: 231.00, hum:false},
  {ref:"12347", name:"Digital Sensor TH (Temp/Humidity)", min:-30, max:70, acc:"±0.3°C / 2%RH", score:8, price: 168.00, hum:true}
];

const baseUnits = [
  // NANO SPY
  {ref:"11567E", name:"Nano SPY T1 (Integrated)", tech:"nano", min:-40, max:85, hum:false, acc:"±0.4°C", score:7, price: 119.00, type:"fixed", legacy:false},
  {ref:"11568E", name:"Nano SPY TH (Integrated)", tech:"nano", min:-30, max:70, hum:true, acc:"±0.4°C", score:7, price: 188.00, type:"fixed", legacy:false},
  {ref:"13491", name:"Nano SPY Digital (Legacy Base)", tech:"nano", min:-200, max:200, hum:false, acc:"Modular", score:0, price: 160.00, type:"modular", legacy:true},
  
  // NOVA SPY
  {ref:"13756E", name:"Nova SPY Digital (Modular Base)", tech:"nova", min:-200, max:200, hum:false, acc:"Modular", score:0, price: 166.00, type:"modular", legacy:false},
  
  // LORA SPY
  {ref:"11809E", name:"LoRa SPY Digital (Modular Base)", tech:"lora", min:-200, max:200, hum:false, acc:"Modular", score:0, price: 270.00, type:"modular", legacy:false}
];

function search(){
  const minT = parseFloat(document.getElementById("minTemp").value);
  const maxT = parseFloat(document.getElementById("maxTemp").value);
  const humReq = document.getElementById("humidity").value === "yes";
  const techPref = document.getElementById("tech").value;
  const showLegacy = document.getElementById("includeLegacy").value === "yes";

  let matches = [];

  baseUnits.forEach(base => {
    if (techPref !== "any" && base.tech !== techPref) return;
    if (base.legacy && !showLegacy) return;

    if (base.type === "fixed") {
      if (base.min <= minT && base.max >= maxT && (!humReq || base.hum)) {
        matches.push({
          name: base.name, baseRef: base.ref, tech: base.tech, min: base.min, max: base.max,
          acc: base.acc, baseP: base.price, probeP: 0, totalP: base.price, legacy: base.legacy
        });
      }
    } else {
      probes.forEach(p => {
        if (p.min <= minT && p.max >= maxT && (!humReq || p.hum)) {
          matches.push({
            name: `${base.name} + ${p.name}`,
            baseRef: base.ref, probeRef: p.ref, tech: base.tech, min: p.min, max: p.max,
            acc: p.acc, baseP: base.price, probeP: p.price, totalP: base.price + p.price, legacy: base.legacy
          });
        }
      });
    }
  });

  matches.sort((a,b) => a.totalP - b.totalP);
  render(matches);
}

function render(matches) {
  const draw = (id, list) => {
    document.getElementById(id).innerHTML = list.map(m => `
      <div class="card ${id==='recommendations'?'highlight':''}">
        <span class="tech-tag tag-${m.tech}">${m.tech.toUpperCase()}</span>
        ${m.legacy ? '<span class="tech-tag tag-legacy">DISCONTINUED</span>' : ''}
        
        <b style="color:var(--jri-blue); display:block;">${m.name}</b>
        <div style="margin: 5px 0;">
           <span class="ref-text">Ref: #${m.baseRef}${m.probeRef ? ' / #' + m.probeRef : ''}</span>
        </div>
        <div class="range-info" style="font-size:0.85rem">Range: ${m.min} to ${m.max}°C | Acc: ${m.acc}</div>
        
        ${m.legacy ? '<div class="legacy-warning">⚠️ Note: Base unit no longer sold. Use for existing stock only.</div>' : ''}

        <div class="breakdown">
          <div class="breakdown-row"><span>Base Unit:</span> <span>$${m.baseP.toFixed(2)}</span></div>
          ${m.probeP > 0 ? `<div class="breakdown-row"><span>Probe:</span> <span>$${m.probeP.toFixed(2)}</span></div>` : ''}
          <div class="breakdown-row total-row"><span>Total:</span> <span>$${m.totalP.toFixed(2)} USD</span></div>
        </div>
      </div>
    `).join("");
  };
  draw("recommendations", matches.slice(0,3));
  draw("results", matches);
}

function exportPDF(){
  html2pdf().from(document.getElementById('export-area')).save("JRI_Quote.pdf");
}
</script>
</body>
</html>
