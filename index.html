<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JRI Project Configurator v2.38</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
  <style>
    :root { --jri-blue: #005596; --jri-green: #4CAF50; --bg: #f4f6f8; --nova: #ff9800; --nano: #2196f3; --lora: #673ab7; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; font-size: 0.85rem; }
    .container { max-width: 1750px; margin: auto; padding: 15px; }
    .dashboard { display: grid; grid-template-columns: 320px 1fr 350px; gap: 15px; }
    
    .controls, .project-cart, .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 3px 8px rgba(0,0,0,0.06); }
    header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border-bottom: 3px solid var(--jri-blue); padding-bottom: 8px; }
    .logo { height: 40px; }

    .toggle-group { display: flex; gap: 4px; margin-bottom: 12px; }
    .toggle-group label { flex: 1; text-align: center; padding: 8px; background: #eee; border-radius: 5px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
    .toggle-group input:checked + label { background: var(--jri-blue); color: white; }
    .toggle-group input { display: none; }

    .range-container { display: flex; gap: 8px; margin-bottom: 12px; }
    .range-box { flex: 1; }
    .range-box input { width: 100%; padding: 8px; border: 1px solid #cbd5e0; border-radius: 5px; box-sizing: border-box; font-size: 0.8rem; }
    .range-box small { display: block; font-size: 0.65rem; color: #777; margin-top: 3px; text-transform: uppercase; text-align: center; }

    .checkbox-group { background: #f9fafb; padding: 8px; border: 1px solid #cbd5e0; border-radius: 6px; margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
    .checkbox-item { display: flex; align-items: center; gap: 4px; font-size: 0.8rem; }

    .recommendation-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 12px; margin-bottom: 25px; }
    .card { border: 1px solid #eee; display: flex; flex-direction: column; min-height: 410px; padding: 12px; }
    .card.highlight { border-top: 4px solid var(--jri-green); }

    .visual-header { display: flex; align-items: center; justify-content: center; height: 100px; border-bottom: 1px solid #f0f0f0; margin-bottom: 8px; background: #fff; }
    .img-wrap { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
    .img-wrap img { max-width: 80%; max-height: 80%; object-fit: contain; }
    .img-label { position: absolute; bottom: 0; font-size: 0.5rem; color: #999; background: rgba(255,255,255,0.8); padding: 0 3px; text-transform: uppercase; }
    
    .tech-tag { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 0.6rem; font-weight: bold; color: white; margin-bottom: 6px; }
    .tag-nova { background: var(--nova); } .tag-nano { background: var(--nano); } .tag-lora { background: var(--lora); }
    
    .card b { font-size: 0.9rem; display: block; min-height: 38px; line-height: 1.2; margin-bottom: 4px; }
    .ref-line { font-size: 0.7rem; color: #666; margin-bottom: 8px; }

    .breakdown { background: #f9fafb; padding: 8px; border-radius: 6px; font-size: 0.75rem; margin-top: auto; border: 1px solid #eee; line-height: 1.4; }
    .price-row { display: flex; justify-content: space-between; margin-bottom: 2px; color: #555; }
    .price-calc { display: flex; justify-content: space-between; border-top: 1px dashed #ccc; margin-top: 6px; padding-top: 6px; font-weight: bold; color: var(--jri-blue); font-size: 0.95rem; }
    
    .cable-select { width: 100%; padding: 4px; margin-top: 6px; font-size: 0.75rem; border-radius: 3px; border: 1px solid #ccc; margin-bottom: 5px; }
    .add-btn { width: 100%; background: var(--jri-green); color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 0.8rem; }
    
    .btn-primary { width: 100%; background: var(--jri-blue); color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
    select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e0; margin-bottom: 12px; font-size: 0.8rem; }

    .no-results { grid-column: 1 / -1; text-align: center; padding: 40px; background: #fff; border: 2px dashed #ccc; border-radius: 10px; color: #777; font-weight: bold; }

    .project-cart { position: sticky; top: 15px; height: fit-content; border-left: 3px solid var(--jri-blue); }
    .total-box { margin-top: 15px; font-size: 1.1rem; font-weight: bold; color: var(--jri-blue); border-top: 2px solid var(--jri-blue); padding-top: 8px; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <img src="JRI-LOGO-BLEU-complet.png" alt="JRI Logo" class="logo">
    <div>
      <h1 style="color: var(--jri-blue); margin:0; font-size: 1.3rem;">JRI Project Configurator</h1>
      <p style="color: #666; margin: 0; font-size: 0.8rem;">v2.38 | Smart Unit Conversion (C/F)</p>
    </div>
  </header>

  <div class="dashboard">
    <div class="controls">
      <label style="font-weight: bold;">Units</label>
      <div class="toggle-group">
        <input type="radio" id="unitC" name="unit" value="C" checked onchange="search()"><label for="unitC">°Celsius</label>
        <input type="radio" id="unitF" name="unit" value="F" onchange="search()"><label for="unitF">°Fahrenheit</label>
      </div>

      <label style="font-weight: bold;">Temp Range</label>
      <div class="range-container">
        <div class="range-box"><input type="number" id="minTemp" value="2"><small>Min</small></div>
        <div class="range-box"><input type="number" id="maxTemp" value="8"><small>Max</small></div>
      </div>

      <label style="font-weight: bold;">Humidity Required?</label>
      <select id="humidity"><option value="no">No</option><option value="yes">Yes</option></select>
      
      <label style="font-weight: bold;">Recorder Range</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" name="tech" value="nova" checked> Nova</label>
        <label class="checkbox-item"><input type="checkbox" name="tech" value="nano" checked> Nano</label>
        <label class="checkbox-item"><input type="checkbox" name="tech" value="lora" checked> LoRa</label>
      </div>
      
      <button class="btn-primary" onclick="search()">Update Search Results</button>
      
      <div class="library-section" style="margin-top:20px; border-top:1px solid #ddd; padding-top:10px;">
        <span style="font-size:0.7rem; color:#888;">Hardware Reference List</span>
        <select id="hardwareRef" style="font-size:0.75rem; height:30px; margin-top:5px;"></select>
      </div>
    </div>

    <div id="main-display">
      <div id="rec-section"><h3>⭐ Recommended Solutions</h3><div id="recommendations" class="recommendation-grid"></div></div>
      <div id="other-section"><h3>📋 All Compatible Matches</h3><div id="results" class="recommendation-grid"></div></div>
    </div>

    <div class="project-cart" id="project-list">
      <h3 style="margin:0;">📋 Project List</h3>
      <div id="cart-items" style="margin-top:12px;"><p style="color:#999; font-size:0.75rem;">Empty List</p></div>
      <div class="total-box">Total: $<span id="project-total">0.00</span> USD</div>
      <button class="btn-primary" style="background:#4a5568; margin-top:8px; padding:10px; font-size:0.8rem;" onclick="exportPDF()">Export Project PDF</button>
      <button style="border:none; background:none; color:red; cursor:pointer; font-size:0.7rem; margin-top:8px; width:100%;" onclick="clearCart()">Clear All</button>
    </div>
  </div>
</div>

<script>
// Logic: Units and Probes updated with pure numerical ranges for calculation
const baseUnits = [
  {ref:"13763X", name:"Nova SPY T Ambient", tech:"nova", price: 154, img:"Nova SPY T Ambient.png", input:"fixed", min:-40, max:80, accNum:0.4, hum:false, score: 10},
  {ref:"13756X", name:"Nova SPY Digital", tech:"nova", price: 166, img:"Nova SPY Digital.png", input:"digital", score: 5},
  {ref:"11567X", name:"Nano SPY T1", tech:"nano", price: 119, img:"Nano SPY T1.png", input:"fixed", min:-40, max:85, accNum:0.3, hum:false, score: 10},
  {ref:"11568X", name:"Nano SPY TH Ambient", tech:"nano", price: 188, img:"Nano SPY TH.png", input:"fixed", min:-30, max:70, accNum:0.4, hum:true, score: 10},
  {ref:"13240X", name:"Nano SPY TH Precision", tech:"nano", price: 215, img:"Nano SPY TH.png", input:"fixed", min:-40, max:85, accNum:0.2, hum:true, score: 10},
  {ref:"11569X", name:"Nano SPY T2 (External)", tech:"nano", price: 125, img:"Nano SPY T2.png", input:"fixed", min:-50, max:105, accNum:0.2, hum:false, score: 10},
  {ref:"12540X", name:"Nano SPY Universal (U)", tech:"nano", price: 245, img:"Nano SPY U.png", input:"analog", score: 4},
  {ref:"13491X", name:"Nano SPY Digital", tech:"nano", price: 160, img:"Nano SPY Digital.png", input:"digital", score: 5},
  {ref:"12266X", name:"LoRa SPY T0", tech:"lora", price: 230, img:"LoRa SPY T1.png", input:"fixed", min:-35, max:85, accNum:0.5, hum:false, score: 10},
  {ref:"12267X", name:"LoRa SPY T1", tech:"lora", price: 242, img:"LoRa SPY T1.png", input:"fixed", min:-30, max:70, accNum:0.4, hum:false, score: 10},
  {ref:"12269X", name:"LoRa SPY T2", tech:"lora", price: 260, img:"LoRa SPY T2.png", input:"fixed", min:-50, max:105, accNum:0.3, hum:false, score: 10},
  {ref:"12273X", name:"LoRa SPY T3 (Low Temp)", tech:"lora", price: 275, img:"LoRa SPY T3.png", input:"fixed", min:-200, max:0, accNum:0.2, hum:false, score: 10},
  {ref:"12268X", name:"LoRa SPY TH", tech:"lora", price: 335, img:"LoRa SPY TH.png", input:"fixed", min:-30, max:70, accNum:0.4, hum:true, score: 10},
  {ref:"12409X", name:"LoRa SPY Reference", tech:"lora", price: 380, img:"LoRa SPY T1.png", input:"fixed", min:-196, max:200, accNum:0.12, hum:false, score: 9},
  {ref:"12276X", name:"LoRa SPY Digital", tech:"lora", price: 270, img:"LoRa SPY Digital.png", input:"digital", score: 5},
  {ref:"11810X", name:"LoRa SPY Universal (U)", tech:"lora", price: 357, img:"LoRa SPY U.png", input:"analog", score: 4}
];

const probes = [
  {ref:"13984", name:"Green Digital Low Temp", min:-200, max:0, accNum:0.2, price: 195, type:"digital", img:"13984 Green Digital Low Temperature Sensor.png", cable: true},
  {ref:"13947", name:"Green Digital Ref", min:-90, max:180, accNum:0.15, price: 188, type:"digital", img:"13947 Green Digital Sensor Reference.png", cable: true},
  {ref:"14129", name:"Green Digital Ref Short", min:-40, max:80, accNum:0.15, price: 175, type:"digital", img:"13947 Green Digital Sensor Reference.png", cable: true},
  {ref:"12347", name:"Green Digital TH Sensor", min:-30, max:70, accNum:0.3, price: 210, type:"digital", img:"12347 Green Digital Temperature and Humidity Sensor.png", hum:true, cable: true},
  {ref:"12366", name:"Industrial TH Enclosure", min:-100, max:200, accNum:0.2, price: 345, type:"analog", img:"12366 Precision TH transmitter – Industrial enclosure.png", hum:true, cable: true},
  {ref:"05891", name:"High-Precision PT100", min:-200, max:260, accNum:0.1, price: 210, type:"analog", img:"05891 High-precision PT100 probe.png", cable: true},
  {ref:"13264", name:"Industrial PT100 High-Temp", min:-50, max:700, accNum:0.1, price: 132, type:"analog", img:"13264 PT100 high-temperature sensor for industrial.png", cable: true}
];

const cablePricing = { "3m": 0, "10m": 15, "25m": 45 };
let projectCart = [];

function convertT(val, isUnitF) {
  if (!isUnitF) return val.toFixed(1) + "°C";
  return ((val * 9/5) + 32).toFixed(1) + "°F";
}

function convertAcc(val, isUnitF) {
  if (!isUnitF) return "±" + val.toFixed(2) + "°C";
  return "±" + (val * 1.8).toFixed(2) + "°F";
}

function search(){
  const unit = document.querySelector('input[name="unit"]:checked').value;
  const isF = (unit === "F");
  let fMin = parseFloat(document.getElementById("minTemp").value);
  let fMax = parseFloat(document.getElementById("maxTemp").value);
  
  // Logic: Always evaluate internal matching in Celsius
  let searchMin = isF ? (fMin - 32) * 5/9 : fMin;
  let searchMax = isF ? (fMax - 32) * 5/9 : fMax;
  
  const humReq = document.getElementById("humidity").value === "yes";
  const sTechs = Array.from(document.querySelectorAll('input[name="tech"]:checked')).map(cb => cb.value);

  let matches = [];
  baseUnits.forEach(base => {
    if (!sTechs.includes(base.tech)) return;
    if (base.input === "fixed") {
      if (base.min <= searchMin && base.max >= searchMax && (!humReq || base.hum)) {
        matches.push({ id: base.ref, fullName: base.name, tech: base.tech, recR: base.ref, recP: base.price, probeR: "", probeP: 0, baseImg: base.img, score: base.score, min: base.min, max: base.max, acc: base.accNum, hasCable: false });
      }
    } else {
      probes.forEach(p => {
        if (p.type === base.input && p.min <= searchMin && p.max >= searchMax && (!humReq || p.hum)) {
          matches.push({ id: base.ref + "-" + p.ref, fullName: `${base.name} + ${p.name}`, tech: base.tech, recR: base.ref, recP: base.price, probeR: p.ref, probeP: p.price, baseImg: base.img, probeImg: p.img, score: base.score, min: p.min, max: p.max, acc: p.accNum, hasCable: p.cable });
        }
      });
    }
  });

  renderList(matches.filter(m => m.score >= 8), "recommendations", true, isF);
  renderList(matches.filter(m => m.score < 8), "results", false, isF);
}

function renderList(list, id, highlight, isF) {
  const container = document.getElementById(id);
  if (list.length === 0) {
    container.innerHTML = highlight ? '' : '<div class="no-results">❌ Sorry, No Matching Results for these criteria.</div>';
    container.parentElement.style.display = highlight ? "none" : "block";
    return;
  }

  container.innerHTML = list.map(m => {
    const uniqueId = m.id.replace(/\W/g, '');
    const displayRange = `${convertT(m.min, isF)} to ${convertT(m.max, isF)}`;
    const displayAcc = convertAcc(m.acc, isF);

    return `
    <div class="card ${highlight ? 'highlight' : ''}">
      <div class="visual-header">
        <div class="img-wrap"><img src="${m.baseImg}"><span class="img-label">Recorder</span></div>
        ${m.probeImg ? `<div class="img-wrap"><img src="${m.probeImg}"><span class="img-label">Probe</span></div>` : ''}
      </div>
      <span class="tech-tag tag-${m.tech}">${m.tech.toUpperCase()}</span>
      <b>${m.fullName}</b>
      <div class="ref-line">Ref: #${m.recR}${m.probeR ? ' + #' + m.probeR : ''}</div>
      <div class="breakdown">
        <div><strong>Range:</strong> ${displayRange} <br> <strong>Acc:</strong> ${displayAcc}</div>
        <div class="price-row" style="margin-top:5px;"><span>Recorder:</span><span>$${m.recP.toFixed(2)}</span></div>
        ${m.probeP > 0 ? `<div class="price-row"><span>Probe:</span><span>$${m.probeP.toFixed(2)}</span></div>` : ''}
        ${m.hasCable ? `
          <select id="cable-${uniqueId}" class="cable-select" onchange="updateCardPrice('${uniqueId}', ${m.recP}, ${m.probeP})">
            <option value="3m">3m Cable ($0.00)</option>
            <option value="10m">10m Cable (+$15.00)</option>
            <option value="25m">25m Cable (+$45.00)</option>
          </select>` : ''}
        <div class="price-calc"><span>Total:</span><span>$<span id="total-${uniqueId}">${(m.recP + m.probeP).toFixed(2)}</span></span></div>
      </div>
      <button class="add-btn" onclick="addToProject('${m.id}', '${m.fullName}', ${m.recP}, ${m.probeP}, '${uniqueId}', ${m.hasCable})">Add to Project +</button>
    </div>`;
  }).join("");
  container.parentElement.style.display = "block";
}

function updateCardPrice(uid, recP, probeP) {
  const cableVal = document.getElementById(`cable-${uid}`).value;
  const cableCost = cablePricing[cableVal];
  document.getElementById(`total-${uid}`).innerText = (recP + probeP + cableCost).toFixed(2);
}

function addToProject(id, name, recP, probeP, uid, hasCable) {
  const cable = hasCable ? document.getElementById(`cable-${uid}`).value : "N/A";
  const cableCost = hasCable ? cablePricing[cable] : 0;
  const totalPrice = recP + probeP + cableCost;
  projectCart.push({ id, name, price: totalPrice, cable });
  updateCart();
}

function updateCart() {
  const container = document.getElementById("cart-items");
  let total = 0;
  if (projectCart.length === 0) { container.innerHTML = '<p style="color:#999; font-size:0.75rem;">Empty List</p>'; document.getElementById("project-total").innerText = "0.00"; return; }
  container.innerHTML = projectCart.map(item => {
    total += item.price;
    return `<div style="font-size:0.75rem; padding:6px 0; border-bottom:1px solid #eee;">
      <b>${item.name}</b><br>
      <small>Cable: ${item.cable}</small> - $${item.price.toFixed(2)}
    </div>`;
  }).join("");
  document.getElementById("project-total").innerText = total.toFixed(2);
}

function clearCart() { projectCart = []; updateCart(); }
function exportPDF() { html2pdf().from(document.getElementById('project-list')).save("JRI_Config_Quote.pdf"); }

// Init Library
const lib = document.getElementById("hardwareRef");
let libHtml = '<option>Select Ref...</option><optgroup label="Recorders">';
baseUnits.forEach(b => libHtml += `<option>${b.ref} - ${b.name}</option>`);
libHtml += '</optgroup><optgroup label="Probes">';
probes.forEach(p => libHtml += `<option>${p.ref} - ${p.name}</option>`);
lib.innerHTML = libHtml;
</script>
</body>
</html>
