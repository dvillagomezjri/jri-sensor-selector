<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JRI Project Configurator v2.22</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
  <style>
    :root { --jri-blue: #005596; --jri-green: #4CAF50; --bg: #f4f6f8; --nova: #ff9800; --nano: #2196f3; --lora: #673ab7; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
    .container { max-width: 1750px; margin: auto; padding: 20px; }
    .dashboard { display: grid; grid-template-columns: 340px 1fr 380px; gap: 20px; }
    .controls, .project-cart, .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
    header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; border-bottom: 4px solid var(--jri-blue); padding-bottom: 10px; }
    .logo { height: 45px; }
    .checkbox-group { background: #f9fafb; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 5px; font-size: 0.85rem; cursor: pointer; }
    .recommendation-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .card { border: 1px solid #eee; display: flex; flex-direction: column; position: relative; min-height: 480px; transition: 0.2s; }
    .card.highlight { border-top: 5px solid var(--jri-green); }
    .visual-header { display: flex; align-items: center; justify-content: center; gap: 10px; height: 130px; margin-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
    .img-wrap { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
    .img-wrap img { max-width: 85%; max-height: 85%; object-fit: contain; }
    .img-label { position: absolute; bottom: 0; font-size: 0.55rem; color: #999; text-transform: uppercase; background: rgba(255,255,255,0.8); padding: 0 4px; }
    .tech-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; color: white; margin-bottom: 5px; }
    .tag-nova { background: var(--nova); } .tag-nano { background: var(--nano); } .tag-lora { background: var(--lora); }
    .breakdown { background: #f9fafb; padding: 10px; border-radius: 8px; font-size: 0.85rem; margin-top: auto; border: 1px solid #eee; line-height: 1.4; }
    .add-btn { width: 100%; background: var(--jri-green); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn-primary { width: 100%; background: var(--jri-blue); color: white; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .toggle-group { display: flex; gap: 5px; margin-bottom: 15px; }
    .toggle-group label { flex: 1; text-align: center; padding: 8px; background: #eee; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
    .toggle-group input:checked + label { background: var(--jri-blue); color: white; }
    .toggle-group input { display: none; }
    .price-calc { display: flex; justify-content: space-between; border-top: 1px dashed #ccc; margin-top: 5px; padding-top: 5px; font-weight: bold; color: var(--jri-blue); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <img src="JRI-LOGO-BLEU-complet.png" alt="JRI Logo" class="logo">
    <div>
      <h1 style="color: var(--jri-blue); margin:0; font-size: 1.6rem;">JRI Project Configurator</h1>
      <p style="color: #666; margin: 0; font-size: 0.9rem;">v2.22 | Full Price Breakdown & Image Restoration</p>
    </div>
  </header>

  <div class="dashboard">
    <div class="controls">
      <div class="toggle-group">
        <input type="radio" id="unitC" name="unit" value="C" checked onchange="search()"><label for="unitC">°Celsius</label>
        <input type="radio" id="unitF" name="unit" value="F" onchange="search()"><label for="unitF">°Fahrenheit</label>
      </div>
      <label>Target Temperature Range</label>
      <div style="display:flex; gap:10px;">
        <input type="number" id="minTemp" value="2" onchange="search()">
        <input type="number" id="maxTemp" value="8" onchange="search()">
      </div>
      <label style="margin-top:10px; display:block;">Humidity Required?</label>
      <select id="humidity" onchange="search()"><option value="no">No</option><option value="yes">Yes</option></select>
      
      <label>Recorder Range</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" name="tech" value="nova" checked onchange="search()"> Nova</label>
        <label class="checkbox-item"><input type="checkbox" name="tech" value="nano" checked onchange="search()"> Nano</label>
        <label class="checkbox-item"><input type="checkbox" name="tech" value="lora" checked onchange="search()"> LoRa</label>
      </div>

      <label>Sorting</label>
      <select id="sortOrder" onchange="search()">
        <option value="recommend">Best Recommendation</option>
        <option value="priceLow">Price: Low to High</option>
      </select>
      
      <button class="btn-primary" onclick="search()">Search Range</button>
    </div>

    <div id="main-display">
      <div id="rec-section"><h3>⭐ Recommended Solutions</h3><div id="recommendations" class="recommendation-grid"></div></div>
      <div id="other-section"><h3>📋 All Compatible Matches</h3><div id="results" class="recommendation-grid"></div></div>
    </div>

    <div class="project-cart" id="project-list">
      <h3 style="margin:0;">📋 Project List</h3>
      <div id="cart-items" style="margin-top:15px;"><p style="color:#999;">Empty List</p></div>
      <div style="margin-top:20px; font-size: 1.3rem; font-weight: bold; color: var(--jri-blue); border-top: 2px solid var(--jri-blue); padding-top: 10px;">
        Total: $<span id="project-total">0.00</span>
      </div>
      <button class="btn-primary" style="background:#4a5568;" onclick="exportPDF()">Export Project PDF</button>
      <button style="border:none; background:none; color:red; cursor:pointer; font-size:0.75rem; margin-top:10px; width:100%;" onclick="clearCart()">Clear All</button>
    </div>
  </div>
</div>

<script>
const baseUnits = [
  {ref:"13763E", name:"Nova SPY T Ambient", tech:"nova", price: 154, img:"Nova SPY T Ambient.png", input:"fixed", min:-40, max:80, acc:"±0.4°C", hum:false, score: 10},
  {ref:"11567E", name:"Nano SPY T1", tech:"nano", price: 119, img:"Nano SPY T1.png", input:"fixed", min:-40, max:85, acc:"±0.4°C", hum:false, score: 10},
  {ref:"11568E", name:"Nano SPY TH", tech:"nano", price: 188, img:"Nano SPY TH.png", input:"fixed", min:-30, max:70, acc:"±0.4°C / 2%RH", hum:true, score: 10},
  {ref:"13756E", name:"Nova SPY Digital", tech:"nova", price: 166, img:"Nova SPY Digital.png", input:"digital", score: 5},
  {ref:"11809E", name:"LoRa SPY Digital", tech:"lora", price: 270, img:"LoRa SPY Digital.png", input:"digital", score: 5},
  {ref:"13491", name:"Nano SPY Digital", tech:"nano", price: 160, img:"Nano SPY Digital.png", input:"digital", score: 5},
  {ref:"11571E", name:"Nano SPY U", tech:"nano", price: 245, img:"Nano SPY U.png", input:"analog", score: 4},
  {ref:"11810E", name:"LoRa SPY U", tech:"lora", price: 357, img:"LoRa SPY U.png", input:"analog", score: 4}
];

const probes = [
  {ref:"13984", name:"Digital Low Temp Sensor", min:-200, max:0, acc:"±0.2°C", price: 195, type:"digital", img:"13984 Green Digital Low Temperature Sensor.png"},
  {ref:"05891", name:"High-Precision PT100", min:-200, max:250, acc:"±0.1°C", price: 210, type:"analog", img:"05891 High-precision PT100 probe.png"},
  {ref:"13947", name:"Digital Sensor Reference", min:-90, max:180, acc:"±0.15°C", price: 188, type:"digital", img:"13947 Green Digital Sensor Reference.png"},
  {ref:"12366", name:"Industrial TH Transmitter", min:-40, max:180, acc:"±0.2°C", price: 345, type:"digital", img:"12366 Precision temperature and humidity transmitter – Industrial enclosure.png", hum:true},
  {ref:"13264", name:"Industrial PT100", min:-50, max:700, acc:"Class A", price: 132, type:"analog", img:"13264 PT100 high-temperature sensor for industrial.png"},
  {ref:"06154", name:"PT100 Bending Spring", min:0, max:450, acc:"Class A", price: 185, type:"analog", img:"06154 PT100 high-temperature sensor with bending spring.png"},
  {ref:"05836", name:"PT100 Immersion Probe", min:-50, max:180, acc:"Class A", price: 145, type:"analog", img:"05836 PT100 Immersion Temperature Probe.png"},
  {ref:"13357", name:"Thin PT100 Probe", min:-50, max:600, acc:"±0.1°C", price: 198, type:"analog", img:"13357 Thin PT100 probe.png"}
];

let projectCart = [];

function search(){
  const unit = document.querySelector('input[name="unit"]:checked').value;
  const sort = document.getElementById("sortOrder").value;
  const fMin = (unit === "F") ? (parseFloat(document.getElementById("minTemp").value)-32)*5/9 : parseFloat(document.getElementById("minTemp").value);
  const fMax = (unit === "F") ? (parseFloat(document.getElementById("maxTemp").value)-32)*5/9 : parseFloat(document.getElementById("maxTemp").value);
  const humReq = document.getElementById("humidity").value === "yes";
  const sTechs = Array.from(document.querySelectorAll('input[name="tech"]:checked')).map(cb => cb.value);

  let matches = [];
  baseUnits.forEach(base => {
    if (!sTechs.includes(base.tech)) return;
    if (base.input === "fixed") {
      if (base.min <= fMin && base.max >= fMax && (!humReq || base.hum)) {
        matches.push({ id: base.ref, fullName: base.name, tech: base.tech, recP: base.price, probeP: 0, totalP: base.price, baseImg: base.img, score: base.score, min: base.min, max: base.max, acc: base.acc });
      }
    } else {
      probes.forEach(p => {
        if (p.type === base.input && p.min <= fMin && p.max >= fMax && (!humReq || p.hum)) {
          matches.push({ id: base.ref + "-" + p.ref, fullName: `${base.name} + ${p.name}`, tech: base.tech, recP: base.price, probeP: p.price, totalP: base.price + p.price, baseImg: base.img, probeImg: p.img, score: base.score, min: p.min, max: p.max, acc: p.acc });
        }
      });
    }
  });

  if (sort === "priceLow") matches.sort((a,b) => a.totalP - b.totalP);
  else matches.sort((a,b) => b.score - a.score);

  renderList(matches.filter(m => m.score >= 8), "recommendations", true);
  renderList(matches.filter(m => m.score < 8), "results", false);
}

function renderList(list, id, highlight) {
  const container = document.getElementById(id);
  container.innerHTML = list.map(m => `
    <div class="card ${highlight ? 'highlight' : ''}">
      <div class="visual-header">
        <div class="img-wrap"><img src="${m.baseImg}"><span class="img-label">Recorder</span></div>
        ${m.probeImg ? `<div class="img-wrap"><img src="${m.probeImg}"><span class="img-label">Probe</span></div>` : ''}
      </div>
      <span class="tech-tag tag-${m.tech}">${m.tech.toUpperCase()}</span>
      <b style="display:block; min-height:40px;">${m.fullName}</b>
      <div class="breakdown">
        <strong>Range:</strong> ${m.min} to ${m.max}°C<br>
        <strong>Accuracy:</strong> ${m.acc}<br>
        <div style="margin-top:5px;">Recorder: $${m.recP.toFixed(2)}</div>
        ${m.probeP > 0 ? `<div>Probe: $${m.probeP.toFixed(2)}</div>` : ''}
        <div class="price-calc">Total: $${m.totalP.toFixed(2)}</div>
      </div>
      <button class="add-btn" onclick="addToProject('${m.id}', '${m.fullName}', ${m.totalP})">Add to Project +</button>
    </div>`).join("");
  container.parentElement.style.display = list.length > 0 ? "block" : "none";
}

function addToProject(id, name, price) {
  const ex = projectCart.find(i => i.id === id);
  if (ex) ex.qty++; else projectCart.push({id, name, price, qty:1});
  updateCart();
}

function updateCart() {
  const container = document.getElementById("cart-items");
  let total = 0;
  if (projectCart.length === 0) { container.innerHTML = '<p style="color:#999;">Select units...</p>'; document.getElementById("project-total").innerText = "0.00"; return; }
  container.innerHTML = projectCart.map(item => {
    total += item.price * item.qty;
    return `<div style="font-size:0.85rem; padding:10px 0; border-bottom:1px solid #eee;"><b>${item.name}</b><br>Qty: ${item.qty} - $${(item.price*item.qty).toFixed(2)}</div>`;
  }).join("");
  document.getElementById("project-total").innerText = total.toFixed(2);
}

function clearCart() { projectCart = []; updateCart(); }
function exportPDF() { html2pdf().from(document.getElementById('project-list')).save("JRI_Project_Summary.pdf"); }

search();
</script>
</body>
</html>
