<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JRI Sensor Recommendation v2.13</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
  <style>
    :root { --jri-blue: #005596; --jri-green: #4CAF50; --bg: #f4f6f8; --nova: #ff9800; --nano: #2196f3; --lora: #673ab7; --legacy: #d32f2f; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
    .container { max-width: 1550px; margin: auto; padding: 20px; }
    .dashboard { display: grid; grid-template-columns: 340px 1fr; gap: 25px; }
    .controls, .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
    
    header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 4px solid var(--jri-blue); padding-bottom: 15px; }
    .logo { height: 50px; }
    
    .checkbox-group { background: #f9fafb; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; margin-top: 5px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px; }
    .checkbox-item { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.85rem; }
    .sub-label { font-size: 0.7rem; color: #777; margin-top: -12px; margin-bottom: 10px; display: block; }

    .recommendation-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .card { border: 1px solid #eee; display: flex; flex-direction: column; transition: 0.2s; position: relative; min-height: 420px; }
    .card.highlight { border-top: 6px solid var(--jri-green); }
    
    .visual-header { display: flex; align-items: center; justify-content: center; gap: 10px; height: 140px; margin-bottom: 15px; background: white; padding: 10px; border-radius: 8px; border-bottom: 1px solid #f0f0f0; }
    .img-wrap { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
    .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .img-label { position: absolute; bottom: -5px; font-size: 0.6rem; color: #aaa; text-transform: uppercase; }

    .tech-tag { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; color: white; margin-bottom: 8px; }
    .tag-nova { background: var(--nova); } .tag-nano { background: var(--nano); } .tag-lora { background: var(--lora); }
    .tag-legacy { background: var(--legacy); }

    .breakdown { background: #f9fafb; padding: 12px; border-radius: 8px; margin-top: auto; border: 1px solid #edf2f7; font-size: 0.85rem; }
    .total-row { border-top: 2px solid var(--jri-blue); padding-top: 8px; margin-top: 5px; font-weight: bold; color: var(--jri-blue); font-size: 1.1rem; }
    
    input, select { width: 100%; padding: 10px; margin: 8px 0 15px 0; border: 1px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; }
    button { width: 100%; background: var(--jri-blue); color: white; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .toggle-group { display: flex; gap: 5px; margin-bottom: 15px; }
    .toggle-group label { flex: 1; text-align: center; padding: 8px; background: #eee; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
    .toggle-group input:checked + label { background: var(--jri-blue); color: white; }
    .toggle-group input { display: none; }
    
    .section-title { border-left: 5px solid var(--jri-blue); padding-left: 15px; margin-top: 0; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <img src="JRI-LOGO-BLEU-complet.png" alt="JRI Logo" class="logo" onerror="this.style.display='none'">
    <div>
      <h1 id="mainTitle" style="color: var(--jri-blue); margin:0; font-size: 1.6rem;">JRI Sensor Recommendation</h1>
      <p id="subTitle" style="color: #666; margin: 0; font-size: 0.9rem;">v2.13 | Smart Ranking & Sorting</p>
    </div>
  </header>

  <div class="dashboard">
    <div class="controls">
      <div class="toggle-group">
        <input type="radio" id="langEN" name="lang" value="en" checked onchange="search()"><label for="langEN">EN</label>
        <input type="radio" id="langES" name="lang" value="es" onchange="search()"><label for="langES">ES</label>
      </div>

      <div class="toggle-group">
        <input type="radio" id="unitC" name="unit" value="C" checked onchange="search()"><label for="unitC">°Celsius</label>
        <input type="radio" id="unitF" name="unit" value="F" onchange="search()"><label for="unitF">°Fahrenheit</label>
      </div>

      <h3 style="font-size: 1rem; margin-bottom: 10px;">Environmental Specs</h3>
      <label style="font-size: 0.9rem;">Temperature Range</label>
      <div style="display:flex; gap:10px; margin-bottom: 0;">
        <div style="flex:1;"><input type="number" id="minTemp" value="2" onchange="search()"><small class="sub-label">Low</small></div>
        <div style="flex:1;"><input type="number" id="maxTemp" value="8" onchange="search()"><small class="sub-label">High</small></div>
      </div>

      <label style="font-size: 0.9rem;">Humidity Required?</label>
      <select id="humidity" onchange="search()">
        <option value="no">No</option>
        <option value="yes">Yes</option>
      </select>

      <label style="font-size: 0.9rem;">Recorder Range</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" name="tech" value="nova" checked onchange="search()"> Nova</label>
        <label class="checkbox-item"><input type="checkbox" name="tech" value="nano" checked onchange="search()"> Nano</label>
        <label class="checkbox-item"><input type="checkbox" name="tech" value="lora" checked onchange="search()"> LoRa</label>
      </div>

      <h3 style="font-size: 1rem; margin-bottom: 10px;">Sorting</h3>
      <select id="sortOrder" onchange="search()">
        <option value="recommend">Best Recommendation</option>
        <option value="priceLow">Price: Low to High</option>
        <option value="priceHigh">Price: High to Low</option>
        <option value="accuracy">Best Accuracy</option>
      </select>

      <button onclick="search()">Search</button>
      <button style="margin-top:10px; background:#4a5568; padding: 8px;" onclick="exportPDF()">Export PDF</button>
    </div>

    <div id="main-display">
        <div id="rec-section">
            <h3 class="section-title" style="color: var(--jri-green);">⭐ Best Recommended Results</h3>
            <div id="recommendations" class="recommendation-grid"></div>
        </div>

        <div id="other-section">
            <h3 class="section-title" style="color: var(--jri-blue);">📋 All Matches</h3>
            <div id="results" class="recommendation-grid"></div>
        </div>
    </div>
  </div>
</div>

<script>
const i18n = {
    en: { recorder: "Recorder", probe: "Probe", rangeInfo: "Range:", accInfo: "Accuracy:", basePrice: "Recorder:", probePrice: "Probe:", totalSystem: "Total:", legacyWarn: "⚠️ Legacy Hardware (#13491)" },
    es: { recorder: "Registrador", probe: "Sonda", rangeInfo: "Rango:", accInfo: "Precisión:", basePrice: "Registrador:", probePrice: "Sonda:", totalSystem: "Total:", legacyWarn: "⚠️ Hardware Legado (#13491)" }
};

const cToF = (c) => (c * 9/5) + 32;
const fToC = (f) => (f - 32) * 5/9;
const accToF = (cOffset) => (cOffset * 9/5);

const probes = [
  // DIGITAL PROBES (Nova/Nano Digital only)
  {ref:"12347", name:"Digital TH Sensor", min:-30, max:70, acc:0.3, price: 168, hum:true, img:"12347 Green Digital Temperature and Humidity Sensor.png", type:"digital", accRank: 7},
  {ref:"14129", name:"Digital Sensor Ref Short", min:-40, max:80, acc:0.15, price: 140, hum:false, img:"14129 Green Digital Sensor Reference Short.png", type:"digital", accRank: 10},
  {ref:"14229", name:"Digital Sensor Standard", min:-40, max:80, acc:"±0.1°C to ±0.5°C", price: 120, hum:false, img:"14229 Green Digital Sensor Standard.png", type:"digital", accRank: 6},
  {ref:"13912", name:"Digital Sensor T Short", min:-40, max:80, acc:0.2, price: 63, hum:false, img:"13912 Green Digital Sensor Temperature (short version).png", type:"digital", accRank: 8},
  {ref:"13947", name:"Digital Sensor Reference", min:-90, max:180, acc:0.15, price: 188, hum:false, img:"13947 Green Digital Sensor Reference.png", type:"digital", novaOnly: true, accRank: 10},
  {ref:"13984", name:"Digital Low Temp Sensor", min:-200, max:0, acc:0.5, price: 231, hum:false, img:"13984 Green Digital Low Temperature Sensor.png", type:"digital", accRank: 5},
  {ref:"13993", name:"Digital Sensor T Long", min:-40, max:80, acc:0.2, price: 80, hum:false, img:"13993 Green Digital Sensor Temperature (long version).png", type:"digital", accRank: 8},
  
  // ANALOG / PT100 PROBES (U Series only)
  {ref:"13572", name:"Autoclave PT100 Probe", min:-50, max:180, acc:"Class A", price: 195, hum:false, img:"13572 Autoclaves PT100 probe Ø4-130mm.png", type:"analog", accRank: 7},
  {ref:"05891", name:"High-Precision PT100 Probe", min:-90, max:150, acc:0.15, price: 210, hum:false, img:"05891 High-precision PT100 probe.png", type:"analog", accRank: 10},
  {ref:"12366", name:"Precision T/H Industrial Enclosure", min:-30, max:70, acc:"±0.3°C", price: 285, hum:true, img:"12366 Precision TH transmitter – Industrial enclosure.png", type:"analog", accRank: 7},
  {ref:"12367", name:"Precision T/H Industrial Ambient", min:-30, max:70, acc:"±0.3°C", price: 285, hum:true, img:"12367 Precision TH transmitter – Industrial ambient.png", type:"analog", accRank: 7},
  {ref:"13264", name:"PT100 Industrial High-Temp", min:-50, max:700, acc:"Class A", price: 132, hum:false, img:"13264 PT100 high-temperature sensor for industrial.png", type:"analog", accRank: 6},
  {ref:"06154", name:"PT100 High-Temp Spring", min:-50, max:450, acc:"Class A", price: 145, hum:false, img:"06154 PT100 high-temperature sensor with bending spring.png", type:"analog", accRank: 6},
  {ref:"05836", name:"PT100 Immersion Probe", min:-50, max:100, acc:"Class A", price: 85, hum:false, img:"05836 PT100 Immersion Temperature Probe.png", type:"analog", accRank: 6},
  {ref:"13357", name:"Thin PT100 Probe", min:-50, max:150, acc:"Class A", price: 105, hum:false, img:"13357 Thin PT100 probe.png", type:"analog", accRank: 6},
  {ref:"05936", name:"PT100 Penetration Probe", min:-50, max:150, acc:"Class A", price: 115, hum:false, img:"05936 PT100 Penetration Probe.png", type:"analog", accRank: 6}
];

const baseUnits = [
  {ref:"13756E", name:"Nova SPY Digital", tech:"nova", price: 166, img:"Nova SPY Digital.png", input:"digital", baseScore: 10},
  {ref:"13491", name:"Nano SPY Digital (Legacy)", tech:"nano", price: 160, img:"Nano SPY Digital.png", input:"digital", legacy: true, baseScore: 2},
  {ref:"11809E", name:"LoRa SPY Digital", tech:"lora", price: 270, img:"LoRa SPY Digital.png", input:"digital", baseScore: 8},
  {ref:"11571E", name:"Nano SPY U", tech:"nano", price: 245, img:"Nano SPY U.png", input:"analog", baseScore: 7},
  {ref:"11810E", name:"LoRa SPY U", tech:"lora", price: 357, img:"LoRa SPY U.png", input:"analog", baseScore: 7},
  {ref:"11567E", name:"Nano SPY T1", tech:"nano", price: 119, img:"Nano SPY T1.png", input:"fixed", min:-40, max:85, acc:"±0.4°C", hum:false, baseScore: 9, accRank: 5}
];

function search(){
  const lang = document.querySelector('input[name="lang"]:checked').value;
  const unit = document.querySelector('input[name="unit"]:checked').value;
  const sort = document.getElementById("sortOrder").value;
  const minI = parseFloat(document.getElementById("minTemp").value);
  const maxI = parseFloat(document.getElementById("maxTemp").value);
  const fMin = (unit === "F") ? fToC(minI) : minI;
  const fMax = (unit === "F") ? fToC(maxI) : maxI;
  const humReq = document.getElementById("humidity").value === "yes";
  const selectedTechs = Array.from(document.querySelectorAll('input[name="tech"]:checked')).map(cb => cb.value);

  let matches = [];
  baseUnits.forEach(base => {
    if (!selectedTechs.includes(base.tech)) return;
    
    if (base.input === "fixed") {
      if (base.min <= fMax && base.max >= fMin && (!humReq || base.hum)) {
        matches.push({ 
            fullName: base.name, tech: base.tech, baseRef: base.ref, 
            baseP: base.price, probeP: 0, totalP: base.price, 
            baseImg: base.img, min: base.min, max: base.max, acc: base.acc, 
            recScore: base.baseScore + (base.accRank || 5), 
            accVal: base.accRank || 5 
        });
      }
    } else {
      probes.forEach(p => {
        if (p.type !== base.input) return;
        if (p.novaOnly && base.tech !== 'nova') return;
        if (p.min <= fMax && p.max >= fMin && (!humReq || p.hum)) {
          matches.push({ 
              fullName: `${base.name} + ${p.name}`, tech: base.tech, 
              baseRef: base.ref, probeRef: p.ref, 
              baseP: base.price, probeP: p.price, totalP: base.price + p.price, 
              baseImg: base.img, probeImg: p.img, min: p.min, max: p.max, acc: p.acc, 
              recScore: base.baseScore + p.accRank, 
              accVal: p.accRank 
          });
        }
      });
    }
  });

  // Apply Sorting
  if (sort === "priceLow") matches.sort((a,b) => a.totalP - b.totalP);
  else if (sort === "priceHigh") matches.sort((a,b) => b.totalP - a.totalP);
  else if (sort === "accuracy") matches.sort((a,b) => b.accVal - a.accVal);
  else matches.sort((a,b) => b.recScore - a.recScore);

  const best = matches.slice(0, 3);
  const others = matches.slice(3);

  render("recommendations", best, unit, lang, true);
  render("results", others, unit, lang, false);
}

function render(containerId, list, unit, lang, isHighlight) {
  const t = i18n[lang];
  const section = document.getElementById(containerId);
  section.innerHTML = list.map(m => {
    let dRange = (unit === "F") ? `${cToF(m.min).toFixed(0)} to ${cToF(m.max).toFixed(0)}°F` : `${m.min} to ${m.max}°C`;
    let dAcc = (typeof m.acc === 'number') ? (unit === "F" ? `±${accToF(m.acc).toFixed(2)}°F` : `±${m.acc}°C`) : m.acc;
    return `
    <div class="card ${isHighlight ? 'highlight' : ''}">
      <div class="visual-header">
        <div class="img-wrap"><img src="${m.baseImg}"><span class="img-label">${t.recorder}</span></div>
        ${m.probeImg ? `<div style="font-size:20px; color:#ccc;">+</div><div class="img-wrap"><img src="${m.probeImg}"><span class="img-label">${t.probe}</span></div>` : ''}
      </div>
      <span class="tech-tag tag-${m.tech}">${m.tech.toUpperCase()}</span>
      <b style="display:block; font-size:0.95rem; margin-bottom:5px;">${m.fullName}</b>
      <div style="font-size:0.75rem; color:#666; margin-bottom:8px;">Ref: #${m.baseRef}${m.probeRef ? ' + #' + m.probeRef : ''}</div>
      <div class="breakdown">
        <div><b>${t.rangeInfo}</b> ${dRange} | <b>${t.accInfo}</b> ${dAcc}</div>
        <hr style="border:0; border-top:1px solid #eee; margin:8px 0;">
        <div style="display:flex; justify-content:space-between; font-size: 0.8rem;"><span>${t.basePrice} $${m.baseP.toFixed(2)}</span> ${m.probeP ? `<span>${t.probePrice} $${m.probeP.toFixed(2)}</span>` : ''}</div>
        <div class="total-row" style="display:flex; justify-content:space-between;"><span>${t.totalSystem}</span> <span>$${m.totalP.toFixed(2)} USD</span></div>
      </div>
    </div>`;
  }).join("");
  
  // Hide section if empty
  section.parentElement.style.display = list.length > 0 ? "block" : "none";
}

function exportPDF(){
  const element = document.getElementById('main-display');
  html2pdf().from(element).save("JRI_Sensor_Recommendation.pdf");
}
search();
</script>
</body>
</html>
