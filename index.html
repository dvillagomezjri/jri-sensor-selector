<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JRI Smart Selector v1.4</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
  <style>
    :root { --jri-blue: #005596; --jri-green: #4CAF50; --bg: #f4f6f8; --nova-color: #ff9800; --nano-color: #2196f3; --lora-color: #673ab7; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #333; }
    .container { max-width: 1300px; margin: auto; padding: 20px; }
    .dashboard { display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
    .controls, .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    
    /* Result Cards */
    .recommendation-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
    .card.highlight { border-top: 6px solid var(--jri-green); position: relative; }
    .tech-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; color: white; margin-bottom: 5px; }
    .tag-nova { background: var(--nova-color); }
    .tag-nano { background: var(--nano-color); }
    .tag-lora { background: var(--lora-color); }

    /* Breakdown Styles */
    .breakdown { font-size: 0.85rem; background: #f9f9f9; padding: 10px; border-radius: 6px; margin-top: 10px; border: 1px dashed #ccc; }
    .breakdown-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .total-row { border-top: 1px solid #ddd; padding-top: 5px; font-weight: bold; color: var(--jri-blue); }
    
    /* UI Inputs */
    input, select, textarea { width: 100%; padding: 10px; margin: 8px 0 15px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; background: var(--jri-blue); color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    button.export { background: #607d8b; margin-top: 10px; }
    .range-info { color: #666; font-size: 0.8rem; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1 style="color: var(--jri-blue);">JRI Smart Sensor Selector</h1>
    <p>v1.4 | Integrated Nova, Nano & LoRa SPY Pricing (USD)</p>
  </header>

  <div class="dashboard">
    <div class="controls">
      <h3>Customer Requirements</h3>
      <label>Min Temp (°C)</label>
      <input type="number" id="minTemp" value="2">
      
      <label>Max Temp (°C)</label>
      <input type="number" id="maxTemp" value="8">

      <label>Humidity Required?</label>
      <select id="humidity">
        <option value="no">No</option>
        <option value="yes">Yes</option>
      </select>

      <label>Technology (Range Preference)</label>
      <select id="tech">
        <option value="any">Any (Compare All)</option>
        <option value="nova">Nova SPY (2.4GHz / Pro)</option>
        <option value="nano">Nano SPY (2.4GHz / Compact)</option>
        <option value="lora">LoRa SPY (Long Range)</option>
      </select>

      <label>Priority</label>
      <select id="application">
        <option value="pharma">Pharma (Accuracy First)</option>
        <option value="food">Food (Value & Compliance)</option>
        <option value="logistics">Logistics (Robust & Wide Range)</option>
      </select>

      <label>Notes</label>
      <textarea id="notes" rows="2"></textarea>
      
      <button onclick="search()">Search Catalog</button>
      <button class="export" onclick="exportPDF()">Export Breakdown PDF</button>
    </div>

    <div id="main-display">
      <div id="export-area">
        <h3>⭐ Top Recommendations</h3>
        <div id="recommendations" class="recommendation-grid"></div>

        <h3>📋 Full Comparison & Breakdown</h3>
        <div id="results"></div>
      </div>
    </div>
  </div>
</div>

<script>
// 🔬 DATA BASED ON 2026 USD PRICE LIST
const probes = [
  {ref:"13912", name:"T° Short Digital", min:-40, max:80, acc:"±0.2°C", score:9, price: 63.00, humidity:false},
  {ref:"13993", name:"T° Long Digital (3m)", min:-40, max:80, acc:"±0.2°C", score:9, price: 80.00, humidity:false},
  {ref:"14129", name:"Ref T° Short", min:-40, max:80, acc:"±0.15°C", score:10, price: 140.00, humidity:false},
  {ref:"13947", name:"Reference T° (3m)", min:-90, max:200, acc:"±0.15°C", score:10, price: 188.00, humidity:false},
  {ref:"13984", name:"Low Temp Digital", min:-200, max:0, acc:"±0.5°C", score:8, price: 231.00, humidity:false},
  {ref:"12347", name:"T/H Digital Probe", min:-30, max:70, acc:"±0.3°C/RH", score:8, price: 168.00, humidity:true}
];

const baseUnits = [
  // NANO SPY (Integrated or Specific Cable)
  {name:"Nano SPY T1", tech:"nano", min:-40, max:85, hum:false, acc:"±0.4°C", score:7, price: 119.00, type:"integrated"},
  {name:"Nano SPY TH", tech:"nano", min:-30, max:70, hum:true, acc:"±0.4°C", score:7, price: 188.00, type:"integrated"},
  {name:"Nano SPY T2 (30cm)", tech:"nano", min:-50, max:105, hum:false, acc:"±0.3°C", score:8, price: 217.00, type:"integrated"},
  
  // NOVA SPY (Modular)
  {name:"Nova SPY Digital", tech:"nova", min:-40, max:80, hum:false, acc:"Probe Dependent", score:0, price: 166.00, type:"modular"},
  {name:"Nova SPY T Ambient", tech:"nova", min:-40, max:80, hum:false, acc:"±0.5°C", score:6, price: 154.00, type:"integrated"},
  
  // LORA SPY (Mixed)
  {name:"LoRa SPY T0", tech:"lora", min:-40, max:85, hum:false, acc:"±0.5°C", score:6, price: 221.00, type:"integrated"},
  {name:"LoRa SPY TH", tech:"lora", min:-30, max:70, hum:true, acc:"±0.4°C", score:7, price: 253.00, type:"integrated"},
  {name:"LoRa SPY Digital", tech:"lora", min:-40, max:80, hum:false, acc:"Probe Dependent", score:0, price: 270.00, type:"modular"},
  {name:"LoRa SPY T3 (Extreme Low)", tech:"lora", min:-200, max:0, hum:false, acc:"±0.2°C", score:9, price: 518.00, type:"integrated"}
];

function search(){
  const minT = parseFloat(document.getElementById("minTemp").value);
  const maxT = parseFloat(document.getElementById("maxTemp").value);
  const humReq = document.getElementById("humidity").value === "yes";
  const techPref = document.getElementById("tech").value;
  const app = document.getElementById("application").value;

  let matches = [];

  baseUnits.forEach(base => {
    if (techPref !== "any" && base.tech !== techPref) return;

    if (base.type === "integrated") {
      if (base.min <= minT && base.max >= maxT && (!humReq || base.hum)) {
        matches.push({...base, basePrice: base.price, probePrice: 0, totalPrice: base.price, finalAcc: base.acc, finalScore: base.score});
      }
    } else {
      probes.forEach(p => {
        if (p.min <= minT && p.max >= maxT && (!humReq || p.humidity)) {
          matches.push({
            name: `${base.name} + ${p.name}`,
            tech: base.tech,
            min: p.min,
            max: p.max,
            finalAcc: p.acc,
            basePrice: base.price,
            probePrice: p.price,
            totalPrice: base.price + p.price,
            finalScore: p.score
          });
        }
      });
    }
  });

  // Application Scoring
  matches.forEach(m => {
    let bonus = 0;
    if (app === "pharma") bonus = m.finalScore * 2;
    if (app === "food") bonus = (10 - (m.totalPrice/100));
    m.rankScore = m.finalScore + bonus;
  });

  matches.sort((a,b) => b.rankScore - a.rankScore);
  render(matches);
}

function render(matches) {
  const top = matches.slice(0,3);
  const container = (id, list) => {
    document.getElementById(id).innerHTML = list.map(m => `
      <div class="card ${id==='recommendations'?'highlight':''}">
        <span class="tech-tag tag-${m.tech}">${m.tech.toUpperCase()} SPY</span>
        <b style="color:var(--jri-blue); display:block; margin-bottom:5px;">${m.name}</b>
        <div class="range-info">Range: ${m.min}°C to ${m.max}°C | Accuracy: ${m.finalAcc}</div>
        
        <div class="breakdown">
          <div class="breakdown-row"><span>Base Unit:</span> <span>$${m.basePrice.toFixed(2)}</span></div>
          ${m.probePrice > 0 ? `<div class="breakdown-row"><span>Probe Unit:</span> <span>$${m.probePrice.toFixed(2)}</span></div>` : ''}
          <div class="breakdown-row total-row"><span>Total System:</span> <span>$${m.totalPrice.toFixed(2)} USD</span></div>
        </div>
      </div>
    `).join("");
  };

  container("recommendations", top);
  container("results", matches);
}

function exportPDF(){
  const element = document.getElementById('export-area');
  html2pdf().from(element).save("JRI_System_Breakdown.pdf");
}
</script>
</body>
</html>
