<!DOCTYPE html>
<html>
<head>
  <title>JRI Smart Sensor Selector</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial; background:#f4f6f8; }
.container { max-width: 1000px; margin:auto; padding:20px; }
.card { background:white; padding:15px; margin-top:10px; border-radius:10px; }
.highlight { border-left:5px solid #4CAF50; }
.controls { background:white; padding:20px; border-radius:10px; margin-bottom:20px; }
button { background:#4CAF50; color:white; padding:10px; border:none; border-radius:8px; margin-top:10px; cursor:pointer;}
small { color:gray; }
</style>
</head>

<body>
<div class="container">

<h2>JRI Smart Sensor Selector</h2>

<div class="controls">

<b>Temperature Range</b><br>
Min: <input type="number" id="minTemp" value="0" min="-200">
Max: <input type="number" id="maxTemp" value="50" min="-200"><br><br>

<b>Humidity Required</b><br>
<select id="humidity">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>

<br><br>

<b>Application</b><br>
<select id="application">
<option value="general">General</option>
<option value="pharma">Pharma</option>
<option value="food">Food</option>
<option value="logistics">Logistics</option>
</select>

<br>
<button onclick="search()">Find Sensors</button>

</div>

<h3>⭐ Recommended</h3>
<div id="recommendations"></div>

<h3>📋 All Matches</h3>
<div id="results"></div>

<textarea id="notes" placeholder="Notes..."></textarea>
<button onclick="exportPDF()">Export PDF</button>

</div>

<script>

// 🔬 REAL PROBE DATABASE
const probes = [
{
ref:"13984",
name:"Low Temp Sensor",
min:-200, max:0,
accuracy:"±0.5°C to ±0.2°C",
accScore:8,
humidity:false
},
{
ref:"13947",
name:"Reference Probe",
min:-90, max:180,
accuracy:"±0.15°C",
accScore:10,
humidity:false
},
{
ref:"14129",
name:"Reference Probe Short",
min:-40, max:80,
accuracy:"±0.15°C",
accScore:10,
humidity:false
},
{
ref:"13993",
name:"Temp Probe Long",
min:-40, max:80,
accuracy:"±0.2°C",
accScore:9,
humidity:false
},
{
ref:"13912",
name:"Temp Probe Short",
min:-40, max:80,
accuracy:"±0.2°C",
accScore:9,
humidity:false
},
{
ref:"12347",
name:"Temp + Humidity Probe",
min:-30, max:70,
accuracy:"±0.3°C / RH",
accScore:8,
humidity:true
}
];

// 🧠 BASE PRODUCTS
const baseProducts = [
{name:"Nano SPY TH", min:-30, max:70, humidity:true, accuracy:"±0.4°C", accScore:7},
{name:"Nano SPY TH High Accuracy", min:-40, max:85, humidity:true, accuracy:"High accuracy", accScore:9},
{name:"Nano SPY T2", min:-50, max:105, humidity:false, accuracy:"±0.3°C", accScore:8},
{name:"Nano SPY T3", min:-200, max:200, humidity:false, accuracy:"±0.2–0.5°C", accScore:9}
];

// 🔧 Build Nova SPY Digital with REAL probes
function buildDigitalProducts(){
return probes.map(p => ({
name:`Nova SPY Digital + ${p.name}`,
ref:p.ref,
min:p.min,
max:p.max,
humidity:p.humidity,
accuracy:p.accuracy,
accScore:p.accScore
}));
}

function search(){

const minT = parseFloat(document.getElementById("minTemp").value);
const maxT = parseFloat(document.getElementById("maxTemp").value);
const humidity = document.getElementById("humidity").value==="yes";
const app = document.getElementById("application").value;

// combine all
let products = [...baseProducts, ...buildDigitalProducts()];

// filter
let matches = products.filter(p =>
p.min<=minT && p.max>=maxT &&
(!humidity || p.humidity)
);

// scoring logic
matches.forEach(p=>{
let score = p.accScore;

// application weighting
if(app==="pharma") score += p.accScore;
if(app==="food") score -= (p.accScore > 8 ? 2 : 0);
if(app==="logistics") score += (p.max-p.min)>150?2:0;

p.score = score;
});

// sort
matches.sort((a,b)=>b.score-a.score);

// top 3
const top = matches.slice(0,3);

document.getElementById("recommendations").innerHTML =
top.map(p=>`
<div class="card highlight">
<b>${p.name}</b><br>
${p.ref ? "Ref: "+p.ref+"<br>" : ""}
Accuracy: ${p.accuracy}
</div>
`).join("");

// all results
document.getElementById("results").innerHTML =
matches.map(p=>`
<div class="card">
<b>${p.name}</b><br>
${p.ref ? "Ref: "+p.ref+"<br>" : ""}
Range: ${p.min} → ${p.max} °C<br>
Humidity: ${p.humidity ? "Yes":"No"}<br>
Accuracy: ${p.accuracy}
</div>
`).join("");
}

function exportPDF(){
html2pdf().from(document.body).save("JRI_Recommendation.pdf");
}

</script>

</body>
</html>
