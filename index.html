<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JRI Project Configurator v2.18</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
  <style>
    :root { --jri-blue: #005596; --jri-green: #4CAF50; --bg: #f4f6f8; --nova: #ff9800; --nano: #2196f3; --lora: #673ab7; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
    .container { max-width: 1750px; margin: auto; padding: 20px; }
    .dashboard { display: grid; grid-template-columns: 320px 1fr 380px; gap: 20px; }
    .controls, .project-cart, .card { background: white; padding: 18px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
    header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; border-bottom: 4px solid var(--jri-blue); padding-bottom: 10px; }
    .logo { height: 45px; }
    .checkbox-group { background: #f9fafb; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; }
    .recommendation-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .card { border: 1px solid #eee; display: flex; flex-direction: column; position: relative; min-height: 420px; transition: 0.2s; }
    .card.highlight { border-top: 5px solid var(--jri-green); }
    .visual-header { display: flex; align-items: center; justify-content: center; gap: 10px; height: 130px; margin-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
    .img-wrap { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
    .img-wrap img { max-width: 85%; max-height: 85%; object-fit: contain; }
    .img-label { position: absolute; bottom: 0; font-size: 0.55rem; color: #999; text-transform: uppercase; background: rgba(255,255,255,0.8); padding: 0 4px; }
    .tech-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; color: white; margin-bottom: 5px; }
    .tag-nova { background: var(--nova); } .tag-nano { background: var(--nano); } .tag-lora { background: var(--lora); }
    .breakdown { background: #f9fafb; padding: 10px; border-radius: 8px; font-size: 0.8rem; margin-top: auto; border: 1px solid #eee; }
    .add-btn { width: 100%; background: var(--jri-green); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .project-cart { position: sticky; top: 20px; height: 85vh; display: flex; flex-direction: column; }
    #cart-items { flex-grow: 1; overflow-y: auto; margin-top: 10px; border-top: 1px solid #eee; }
    .cart-item { font-size: 0.8rem; padding: 10px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .total-box { margin-top: 10px; font-size: 1.2rem; font-weight: bold; color: var(--jri-blue); border-top: 2px solid var(--jri-blue); padding-top: 10px; }
    input, select { width: 100%; padding: 8px; margin: 8px 0 12px 0; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 0.85rem; }
    .btn-primary { width: 100%; background: var(--jri-blue); color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .qty-ctrl { display: flex; align-items: center; gap: 8px; }
    .qty-btn { background: #eee; border: 1px solid #ccc; padding: 2px 6px; cursor: pointer; border-radius: 4px; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <img src="JRI-LOGO-BLEU-complet.png" alt="JRI Logo" class="logo">
    <div>
      <h1 style="color: var(--jri-blue); margin:0; font-size: 1.4rem;">JRI Project Builder v2.18</h1>
      <p style="margin:0; font-size:0.8rem; color:#666;">Multi-Range Selection & Quote Generation</p>
    </div>
  </header>

  <div class="dashboard">
    <div class="controls">
      <div style="display:flex; gap:10px; margin-bottom:15px;">
        <div style="flex:1"><input type="radio" id="uC" name="u" value="C" checked onchange="search()"><label for="uC"> °C</label></div>
        <div style="flex:1"><input type="radio" id="uF" name="u" value="F" onchange="search()"><label for="uF"> °F</label></div>
      </div>
      <label>Target Range</label>
      <div style="display:flex; gap:8px;">
        <input type="number" id="minT" value="2" onchange="search()">
        <input type="number" id="maxT" value="8" onchange="search()">
      </div>
      <label>Tech Choice</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" name="tech" value="nova" checked onchange="search()"> Nova</label>
        <label class="checkbox-item"><input type="checkbox" name="tech" value="nano" checked onchange="search()"> Nano</label>
        <label class="checkbox-item"><input type="checkbox" name="tech" value="lora" checked onchange="search()"> LoRa</label>
      </div>
      <label>Humidity Required?</label>
      <select id="hum" onchange="search()"><option value="no">No</option><option value="yes">Yes</option></select>
      <button class="btn-primary" onclick="search()">Search Range</button>
    </div>

    <div id="main-display">
        <div id="rec-sec"><h3 style="color: var(--jri-green);">⭐ Recommended Units</h3><div id="recommendations" class="recommendation-grid"></div></div>
        <div id="oth-sec"><h3 style="color: var(--jri-blue);">📋 Modular Solutions</h3><div id="results" class="recommendation-grid"></div></div>
    </div>

    <div class="project-cart" id="project-list">
      <h3 style="margin:0;">Project Summary</h3>
      <div id="cart-items"><p style="color:#999; font-size:0.8rem;">Select units to build a project list.</p></div>
      <div class="total-box">Est. Total: $<span id="project-total">0.00</span></div>
      <button class="btn-primary" style="background:#4a5568; margin-top:10px;" onclick="exportPDF()">Export Project PDF</button>
      <button style="border:none; background:none; color:red; cursor:pointer; font-size:0.7rem; margin-top:10px;" onclick="clearCart()">Clear All</button>
    </div>
  </div>
</div>

<script>
// FULL HARDWARE DATABASE RESTORATION
const baseUnits = [
  // Integrated
  {ref:"13763E", name:"Nova SPY T Ambient", tech:"nova", price: 154, img:"Nova SPY T Ambient.png", input:"fixed", min:-40, max:80, acc:"±0.4°C", hum:false, priority:10},
  {ref:"11567E", name:"Nano SPY T1", tech:"nano", price: 119, img:"Nano SPY T1.png", input:"fixed", min:-40, max:85, acc:"±0.4°C", hum:false, priority:10},
  {ref:"11568E", name:"Nano SPY TH", tech:"nano", price: 188, img:"Nano SPY TH.png", input:"fixed", min:-30, max:70, acc:"±0.4°C / 2%RH", hum:true, priority:10},
  {ref:"11802E", name:"LoRa SPY T1", tech:"lora", price: 242, img:"LoRa SPY T1.png", input:"fixed", min:-30, max:70, acc:"±0.4°C", hum:false, priority:10},
  {ref:"11803E", name:"LoRa SPY TH", tech:"lora", price: 335, img:"LoRa SPY TH.png", input:"fixed", min:-30, max:70, acc:"±0.4°C / 2%RH", hum:true, priority:10},
  // Modular Bases (Digital)
  {ref:"13756E", name:"Nova SPY Digital", tech:"nova", price: 166, img:"Nova SPY Digital.png", input:"digital", priority:5},
  {ref:"11809E", name:"LoRa SPY Digital", tech:"lora", price: 270, img:"LoRa SPY Digital.png", input:"digital", priority:5},
  {ref:"13491", name:"Nano SPY Digital", tech:"nano", price: 160, img:"Nano SPY Digital.png", input:"digital", priority:5},
  // Modular Bases (Universal/Analog)
  {ref:"11571E", name:"Nano SPY U", tech:"nano", price: 245, img:"Nano SPY U.png", input:"analog", priority:4},
  {ref:"11810E", name:"LoRa SPY U", tech:"lora", price: 357, img:"LoRa SPY U.png", input:"analog", priority:4}
];

const probes = [
  // Digital Probes
  {ref:"13947", name:"Digital Sensor Reference", min:-90, max:180, acc:0.15, price: 188, type:"digital", img:"13947 Green Digital Sensor Reference.png", score:10},
  {ref:"14129", name:"Digital Ref Short", min:-40, max:80, acc:0.15, price: 140, type:"digital", img:"14129 Green Digital Sensor Reference Short.png", score:10},
  {ref:"12347", name:"Digital TH Sensor", min:-30, max:70, acc:0.3, price: 168, type:"digital", img:"12347 Green Digital Temperature and Humidity Sensor.png", score:8},
  // PT100 Analog Probes
  {ref:"13264", name:"PT100 Industrial High-Temp", min:-50, max:700, acc:"Class A", price: 132, type:"analog", img:"13264 PT100 high-temperature sensor for industrial.png", score:8},
  {ref:"13572", name:"Autoclave PT100 Probe", min:-50, max:180, acc:"Class A", price: 195, type:"analog", img:"13572 Autoclaves PT100 probe Ø4-130mm.png", score:8}
];

let projectCart = [];

function search(){
  const unit = document.querySelector('input[name="u"]:checked').value;
  const fMin = (unit === "F") ? (parseFloat(document.getElementById("minT").value)-32)*5/9 : parseFloat(document.getElementById("minT").value);
  const fMax = (unit === "F") ? (parseFloat(document.getElementById("maxT").value)-32)*5/9 : parseFloat(document.getElementById("maxT").value);
  const humReq = document.getElementById("hum").value === "yes";
  const sTechs = Array.from(document.querySelectorAll('input[name="tech"]:checked')).map(cb => cb.value);

  let matches = [];
  baseUnits.forEach(base => {
    if (!sTechs.includes(base.tech)) return;
    if (base.input === "fixed") {
      if (base.min <= fMax && base.max >= fMin && (!humReq || base.hum)) {
        matches.push({ id: base.ref, fullName: base.name, tech: base.tech, price: base.price, baseImg: base.img, priority: base.priority, min: base.min, max: base.max, acc: base.acc });
      }
    } else {
      probes.forEach(p => {
        if (p.type === base.input && p.min <= fMax && p.max >= fMin) {
          matches.push({ id: base.ref + "-" + p.ref, fullName: `${base.name} + ${p.name}`, tech: base.tech, price: base.price + p.price, baseImg: base.img, probeImg: p.img, priority: base.priority, min: p.min, max: p.max, acc: p.acc });
        }
      });
    }
  });

  render(matches.filter(m => m.priority >= 10), "recommendations", true);
  render(matches.filter(m => m.priority < 10), "results", false);
}

function render(list, containerId, highlight) {
  const container = document.getElementById(containerId);
  container.innerHTML = list.map(m => `
    <div class="card ${highlight ? 'highlight' : ''}">
      <div class="visual-header">
        <div class="img-wrap"><img src="${m.baseImg}"><span class="img-label">Recorder</span></div>
        ${m.probeImg ? `<div class="img-wrap"><img src="${m.probeImg}"><span class="img-label">Probe</span></div>` : ''}
      </div>
      <span class="tech-tag tag-${m.tech}">${m.tech.toUpperCase()}</span>
      <b style="font-size:0.9rem;">${m.fullName}</b>
      <div class="breakdown">
        Range: ${m.min}/${m.max}°C | Acc: ${m.acc}<br>
        <strong>$${m.price.toFixed(2)} USD</strong>
      </div>
      <button class="add-btn" onclick="addToProject('${m.id}', '${m.fullName}', ${m.price})">Add to Project +</button>
    </div>`).join("");
  container.parentElement.style.display = list.length > 0 ? "block" : "none";
}

function addToProject(id, name, price) {
  const ex = projectCart.find(i => i.id === id);
  if (ex) ex.qty++; else projectCart.push({id, name, price, qty:1});
  updateCart();
}

function updateCart() {
  const container = document.getElementById("cart-items");
  let total = 0;
  if(projectCart.length === 0) { container.innerHTML = '<p style="color:#999; font-size:0.8rem;">Select units...</p>'; document.getElementById("project-total").innerText = "0.00"; return; }
  container.innerHTML = projectCart.map(item => {
    total += item.price * item.qty;
    return `
      <div class="cart-item">
        <div style="flex:1;"><b>${item.name}</b><br><small>$${item.price.toFixed(2)} ea</small></div>
        <div class="qty-ctrl">
            <button class="qty-btn" onclick="adjustQty('${item.id}', -1)">-</button>
            <span>${item.qty}</span>
            <button class="qty-btn" onclick="adjustQty('${item.id}', 1)">+</button>
        </div>
      </div>`;
  }).join("");
  document.getElementById("project-total").innerText = total.toFixed(2);
}

function adjustQty(id, delta) {
  const i = projectCart.find(x => x.id === id);
  if (i) { i.qty += delta; if (i.qty <= 0) projectCart = projectCart.filter(x => x.id !== id); }
  updateCart();
}

function clearCart() { projectCart = []; updateCart(); }
function exportPDF() { html2pdf().from(document.getElementById('project-list')).save("JRI_Project_Quote.pdf"); }

search();
</script>
</body>
</html>
