<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JRI Configurator v2.30</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
  <style>
    :root { --jri-blue: #005596; --jri-green: #4CAF50; --bg: #f4f6f8; --nova: #ff9800; --nano: #2196f3; --lora: #673ab7; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
    .container { max-width: 1750px; margin: auto; padding: 20px; }
    .dashboard { display: grid; grid-template-columns: 340px 1fr 380px; gap: 20px; }
    
    .controls, .project-cart, .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
    header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; border-bottom: 4px solid var(--jri-blue); padding-bottom: 10px; }
    .logo { height: 45px; }

    /* Search Sidebar Styling */
    .checkbox-group { background: #f9fafb; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; }
    .sub-label { font-size: 0.65rem; color: #777; margin-top: -12px; margin-bottom: 10px; display: block; }

    /* Results Area */
    .recommendation-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .card { border: 1px solid #eee; display: flex; flex-direction: column; position: relative; min-height: 380px; transition: 0.2s; }
    .card.highlight { border-top: 5px solid var(--jri-green); }

    .visual-header { display: flex; align-items: center; justify-content: center; gap: 10px; height: 120px; margin-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
    .img-wrap { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
    .img-wrap img { max-width: 80%; max-height: 80%; object-fit: contain; }

    .tech-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; color: white; margin-bottom: 5px; }
    .tag-nova { background: var(--nova); } .tag-nano { background: var(--nano); } .tag-lora { background: var(--lora); }

    .breakdown { background: #f9fafb; padding: 10px; border-radius: 8px; font-size: 0.8rem; margin-top: auto; }
    .add-btn { width: 100%; background: var(--jri-green); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    
    /* Project Cart Styling */
    .project-cart { position: sticky; top: 20px; height: fit-content; border-left: 4px solid var(--jri-blue); }
    .total-box { margin-top: 20px; font-size: 1.2rem; font-weight: bold; color: var(--jri-blue); border-top: 2px solid var(--jri-blue); padding-top: 10px; }

    input, select { width: 100%; padding: 8px; margin: 8px 0 12px 0; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 0.85rem; }
    .btn-primary { width: 100%; background: var(--jri-blue); color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    
    /* MODIFICATION START: RESTORING BLUE BUTTONS */
    .toggle-group { display: flex; gap: 10px; margin-bottom: 12px; }
    .toggle-group label { flex: 1; text-align: center; padding: 10px; background: #eee; border-radius: 5px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
    .toggle-group input:checked + label { background: var(--jri-blue); color: white; }
    .toggle-group input { display: none; }
    /* MODIFICATION END */
    
    .section-title { border-left: 4px solid var(--jri-blue); padding-left: 10px; margin-top: 0; font-size: 1.1rem; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <img src="JRI-LOGO-BLEU-complet.png" alt="JRI Logo" class="logo" onerror="this.style.display='none'">
    <div>
      <h1 id="mainTitle" style="color: var(--jri-blue); margin:0; font-size: 1.4rem;">JRI Project Configurator</h1>
      <p id="subTitle" style="color: #666; margin: 0; font-size: 0.8rem;">v2.30 | UI Overlap Fix & Restored Toggles</p>
    </div>
  </header>

  <div class="dashboard">
    <div class="controls">
      <label style="font-size: 0.85rem; font-weight: bold;">Language / Idioma</label>
      <div class="toggle-group">
        <input type="radio" id="langEN" name="lang" value="en" checked><label for="langEN">English</label>
        <input type="radio" id="langES" name="lang" value="es"><label for="langES">Español</label>
      </div>
      
      <label style="font-size: 0.85rem; font-weight: bold; margin-top:10px; display:block;">Units / Unidades</label>
      <div class="toggle-group">
        <input type="radio" id="unitC" name="unit" value="C" checked><label for="unitC">°Celsius</label>
        <input type="radio" id="unitF" name="unit" value="F"><label for="unitF">°Fahrenheit</label>
      </div>

      <h3 data-key="envSpecs" style="font-size: 1rem; margin-bottom: 10px;">Environmental Specs</h3>
      <label data-key="rangeLabel" style="font-size: 0.85rem;">Temperature Range</label>
      
      <div style="display:flex; gap:10px; margin-bottom: 0;">
        <div style="flex:1;">
          <input type="number" id="minTemp" value="2">
          <small class="sub-label">Low</small>
        </div>
        <div style="flex:1;">
          <input type="number" id="maxTemp" value="8">
          <small class="sub-label">High</small>
        </div>
      </div>
      
      <label data-key="humLabel" style="font-size: 0.85rem;">Humidity Required?</label>
      <select id="humidity">
        <option value="no" data-key="no">No</option>
        <option value="yes" data-key="yes">Yes</option>
      </select>

      <label data-key="techLabel" style="font-size: 0.85rem;">Recorder Range</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" name="tech" value="nova" checked> Nova</label>
        <label class="checkbox-item"><input type="checkbox" name="tech" value="nano" checked> Nano</label>
        <label class="checkbox-item"><input type="checkbox" name="tech" value="lora" checked> LoRa</label>
      </div>

      <button class="btn-primary" onclick="search()" data-key="btnFilter">Update Search Results</button>
      <button style="margin-top:10px; background:#4a5568; padding: 10px;" onclick="exportPDF()" data-key="btnExport">Export PDF Quote</button>
    </div>

    <div id="main-display" style="display:none;">
        <div id="rec-section"><h3 class="section-title" style="color: var(--jri-green);">⭐ Recommended for this Range</h3><div id="recommendations" class="recommendation-grid"></div></div>
        <div id="other-section"><h3 class="section-title" style="color: var(--jri-blue);">📋 Other Matches</h3><div id="results" class="recommendation-grid"></div></div>
    </div>

    <div class="project-cart" id="cart-container" style="display:none;">
      <h3 style="margin-top: 0;">📋 Project List</h3>
      <div id="cart-items">
        <p style="color: #999; font-size: 0.85rem;">No units added yet.</p>
      </div>
      <div class="total-box">
        Total: $<span id="project-total">0.00</span>
      </div>
    </div>
  </div>
</div>

<script>
// Logic & Hardware Data
const baseUnits = [
  {ref:"13756E", name:"Nova SPY Digital", tech:"nova", price: 166, img:"Nova SPY Digital.png", input:"digital", score: 5},
  {ref:"13763E", name:"Nova SPY T Ambient", tech:"nova", price: 154, img:"Nova SPY T Ambient.png", input:"fixed", min:-40, max:80, acc:"±0.4°C", hum:false, score: 10},
  {ref:"11567E", name:"Nano SPY T1", tech:"nano", price: 119, img:"Nano SPY T1.png", input:"fixed", min:-40, max:85, acc:"±0.4°C", hum:false, score: 10},
  {ref:"11568E", name:"Nano SPY TH", tech:"nano", price: 188, img:"Nano SPY TH.png", input:"fixed", min:-30, max:70, acc:"±0.4°C / 2%RH", hum:true, score: 10},
  {ref:"11802E", name:"LoRa SPY T1", tech:"lora", price: 242, img:"LoRa SPY T1.png", input:"fixed", min:-30, max:70, acc:"±0.4°C", hum:false, score: 10},
  {ref:"11806E", name:"LoRa SPY T3", tech:"lora", price: 518, img:"LoRa SPY T3.png", input:"fixed", min:-200, max:0, acc:"±0.2°C", hum:false, score: 9},
  {ref:"11803E", name:"LoRa SPY TH", tech:"lora", price: 335, img:"LoRa SPY TH.png", input:"fixed", min:-30, max:70, acc:"±0.4°C / 2%RH", hum:true, score: 10}
];

const probes = [
  {ref:"13912", name:"Digital Sensor T Short", min:-40, max:80, acc:0.2, price: 63, type:"digital", img:"13912 Green Digital Sensor Temperature (short version).png"}
];

let projectCart = [];

// MODIFICATION: Search function only runs when the button is explicitly clicked.
function search(){
  const unit = document.querySelector('input[name="unit"]:checked').value;
  const fMin = (unit === "F") ? (parseFloat(document.getElementById("minTemp").value)-32)*5/9 : parseFloat(document.getElementById("minTemp").value);
  const fMax = (unit === "F") ? (parseFloat(document.getElementById("maxTemp").value)-32)*5/9 : parseFloat(document.getElementById("maxTemp").value);
  const humReq = document.getElementById("humidity").value === "yes";
  const sTechs = Array.from(document.querySelectorAll('input[name="tech"]:checked')).map(cb => cb.value);

  // Validate input
  if(isNaN(fMin) || isNaN(fMax) || fMin >= fMax){
    alert("Please enter a valid temperature range.");
    return;
  }

  let matches = [];
  baseUnits.forEach(base => {
    if (!sTechs.includes(base.tech)) return;
    if (base.input === "fixed") {
      if (base.min <= fMax && base.max >= fMin && (!humReq || base.hum)) {
        matches.push({ id: base.ref, fullName: base.name, tech: base.tech, price: base.price, baseImg: base.img, score: base.score, min: base.min, max: base.max, acc: base.acc });
      }
    } else {
      probes.forEach(p => {
        if (p.type === base.input && p.min <= fMax && p.max >= fMin && (!humReq || p.hum)) {
          matches.push({ id: base.ref + p.ref, fullName: `${base.name} + ${p.name}`, tech: base.tech, price: base.price + p.price, baseImg: base.img, probeImg: p.img, score: base.score, min: p.min, max: p.max, acc: p.acc });
        }
      });
    }
  });

  // Reveal display sections once search runs
  document.getElementById("main-display").style.display = "block";
  document.getElementById("cart-container").style.display = "block";

  renderResults("recommendations", matches.filter(m => m.score >= 10), true);
  renderResults("results", matches.filter(m => m.score < 10), false);
}

function renderResults(id, list, highlight) {
  const container = document.getElementById(id);
  container.innerHTML = list.map(m => `
    <div class="card ${highlight ? 'highlight' : ''}">
      <div class="visual-header">
        <div class="img-wrap"><img src="${m.baseImg}"><span class="img-label">Recorder</span></div>
        ${m.probeImg ? `<div class="img-wrap"><img src="${m.probeImg}"><span class="img-label">Probe</span></div>` : ''}
      </div>
      <span class="tech-tag tag-${m.tech}">${m.tech.toUpperCase()}</span>
      <b>${m.fullName}</b>
      <div class="breakdown">
        Range: ${m.min}/${m.max}°C | Acc: ${m.acc}<br>
        <strong>$${m.price.toFixed(2)} USD</strong>
      </div>
      <button class="add-btn" onclick="addToProject('${m.id}', '${m.fullName}', ${m.price})">Add to Project +</button>
    </div>`).join("");
  container.parentElement.style.display = list.length > 0 ? "block" : "none";
}

function addToProject(id, name, price) {
  projectCart.push({ id, name, price });
  updateCart();
}

function updateCart() {
  const container = document.getElementById("cart-items");
  let total = 0;
  if(projectCart.length === 0){
    container.innerHTML = '<p style="color: #999; font-size: 0.85rem;">No units added yet.</p>';
    document.getElementById("project-total").innerText = "0.00";
    return;
  }
  container.innerHTML = projectCart.map(item => {
    total += item.price;
    return `<div style="font-size:0.8rem; border-bottom:1px solid #eee; padding:5px 0;">${item.name} - $${item.price.toFixed(2)}</div>`;
  }).join("");
  document.getElementById("project-total").innerText = total.toFixed(2);
}

function clearCart() { projectCart = []; updateCart(); }

function exportPDF() {
    const element = document.getElementById('project-list');
    html2pdf().from(element).save("JRI_Project_Summary.pdf");
}

// search(); // Auto-search disabled on load
</script>
</body>
</html>
