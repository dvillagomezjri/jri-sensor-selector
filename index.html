<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JRI Sensor Recommendation v2.11</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
  <style>
    :root { --jri-blue: #005596; --jri-green: #4CAF50; --bg: #f4f6f8; --nova: #ff9800; --nano: #2196f3; --lora: #673ab7; --legacy: #d32f2f; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
    .container { max-width: 1550px; margin: auto; padding: 20px; }
    .dashboard { display: grid; grid-template-columns: 380px 1fr; gap: 25px; }
    .controls, .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
    header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 4px solid var(--jri-blue); padding-bottom: 15px; }
    .logo { height: 60px; }
    .checkbox-group { background: #f9fafb; padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; margin-top: 8px; margin-bottom: 18px; }
    .checkbox-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; cursor: pointer; font-size: 0.9rem; }
    .recommendation-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
    .card { border: 1px solid #eee; display: flex; flex-direction: column; transition: 0.2s; position: relative; }
    .visual-header { display: flex; align-items: center; justify-content: center; gap: 10px; height: 160px; margin-bottom: 15px; background: white; padding: 10px; border-radius: 8px; border-bottom: 1px solid #f0f0f0; }
    .img-wrap { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
    .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .img-label { position: absolute; bottom: -5px; font-size: 0.65rem; color: #aaa; text-transform: uppercase; }
    .tech-tag { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; color: white; margin-bottom: 10px; }
    .tag-nova { background: var(--nova); } .tag-nano { background: var(--nano); } .tag-lora { background: var(--lora); }
    .tag-legacy { background: var(--legacy); }
    .breakdown { background: #f9fafb; padding: 12px; border-radius: 8px; margin-top: auto; border: 1px solid #edf2f7; font-size: 0.85rem; }
    .total-row { border-top: 2px solid var(--jri-blue); padding-top: 8px; margin-top: 5px; font-weight: bold; color: var(--jri-blue); font-size: 1.1rem; }
    input, select { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; }
    button { width: 100%; background: var(--jri-blue); color: white; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .toggle-group { display: flex; gap: 10px; margin-bottom: 15px; }
    .toggle-group label { flex: 1; text-align: center; padding: 10px; background: #eee; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
    .toggle-group input { display: none; }
    .toggle-group input:checked + label { background: var(--jri-blue); color: white; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <img src="JRI-LOGO-BLEU-complet.png" alt="JRI Logo" class="logo" onerror="this.style.display='none'">
    <div><h1 id="mainTitle">JRI Sensor Recommendation</h1><p id="subTitle">v2.11 | Specialized Compatibility Matrix</p></div>
  </header>

  <div class="dashboard">
    <div class="controls">
      <h3 data-key="langSelect">Language / Idioma</h3>
      <div class="toggle-group"><input type="radio" id="langEN" name="lang" value="en" checked onchange="search()"><label for="langEN">English</label><input type="radio" id="langES" name="lang" value="es" onchange="search()"><label for="langES">Español</label></div>
      <h3 data-key="unitSelect">Units / Unidades</h3>
      <div class="toggle-group"><input type="radio" id="unitC" name="unit" value="C" checked onchange="search()"><label for="unitC">Celsius (°C)</label><input type="radio" id="unitF" name="unit" value="F" onchange="search()"><label for="unitF">Fahrenheit (°F)</label></div>
      <h3 data-key="envSpecs">Environmental Specs</h3>
      <label data-key="rangeLabel">Temperature Range</label>
      <div style="display:flex; gap:10px;"><input type="number" id="minTemp" value="2" onchange="search()"><input type="number" id="maxTemp" value="8" onchange="search()"></div>
      <label data-key="humLabel">Humidity Required?</label>
      <select id="humidity" onchange="search()"><option value="no" data-key="no">No</option><option value="yes" data-key="yes">Yes</option></select>
      <label data-key="techLabel">Recorder Range</label>
      <div class="checkbox-group" id="techContainer">
        <label class="checkbox-item"><input type="checkbox" name="tech" value="nova" checked onchange="search()"> Nova SPY</label>
        <label class="checkbox-item"><input type="checkbox" name="tech" value="nano" checked onchange="search()"> Nano SPY</label>
        <label class="checkbox-item"><input type="checkbox" name="tech" value="lora" checked onchange="search()"> LoRa SPY</label>
      </div>
      <button onclick="search()" data-key="btnFilter">Update Selection</button>
      <button style="margin-top:10px; background:#4a5568;" onclick="exportPDF()" data-key="btnExport">Export PDF Quote</button>
    </div>
    <div id="main-display"><div id="results" class="recommendation-grid"></div></div>
  </div>
</div>

<script>
const i18n = {
    en: { recorder: "Recorder", probe: "Probe", rangeInfo: "Measurement Range:", accInfo: "Accuracy:", basePrice: "Recorder Base:", probePrice: "Selected Probe:", totalSystem: "Total System:", legacyWarn: "⚠️ Note: Nano SPY Digital (#13491) is no longer sold." },
    es: { recorder: "Registrador", probe: "Sonda", rangeInfo: "Rango de Medición:", accInfo: "Precisión:", basePrice: "Base del Registrador:", probePrice: "Sonda Seleccionada:", totalSystem: "Sistema Total:", legacyWarn: "⚠️ Nota: Nano SPY Digital (#13491) ya no se vende." }
};

const cToF = (c) => (c * 9/5) + 32;
const fToC = (f) => (f - 32) * 5/9;
const accToF = (cOffset) => (cOffset * 9/5);

const probes = [
  // 🟢 DIGITAL PROBES (For Nova/Nano/LoRa DIGITAL units only)
  {ref:"12347", name:"Digital TH Sensor", min:-30, max:70, acc:0.3, price: 168, hum:true, img:"12347 Green Digital Temperature and Humidity Sensor.png", type:"digital"},
  {ref:"14129", name:"Digital Sensor Ref Short", min:-40, max:80, acc:0.15, price: 140, hum:false, img:"14129 Green Digital Sensor Reference Short.png", type:"digital"},
  {ref:"14229", name:"Digital Sensor Standard", min:-40, max:80, acc:"±0.1°C to ±0.5°C", price: 120, hum:false, img:"14229 Green Digital Sensor Standard.png", type:"digital"},
  {ref:"13912", name:"Digital Sensor T Short", min:-40, max:80, acc:0.2, price: 63, hum:false, img:"13912 Green Digital Sensor Temperature (short version).png", type:"digital"},
  {ref:"13947", name:"Digital Sensor Reference", min:-90, max:180, acc:0.15, price: 188, hum:false, img:"13947 Green Digital Sensor Reference.png", type:"digital", novaOnly: true},
  {ref:"13984", name:"Digital Low Temp Sensor", min:-200, max:0, acc:0.5, price: 231, hum:false, img:"13984 Green Digital Low Temperature Sensor.png", type:"digital"},
  {ref:"13993", name:"Digital Sensor T Long", min:-40, max:80, acc:0.2, price: 80, hum:false, img:"13993 Green Digital Sensor Temperature (long version).png", type:"digital"},
  
  // 🔵 PT100/INDUSTRIAL PROBES (For "U" series units only)
  {ref:"13572", name:"Autoclave PT100 Probe Ø4-130mm", min:-50, max:180, acc:"Class A", price: 195, hum:false, img:"13572 Autoclaves PT100 probe Ø4-130mm.png", type:"analog"},
  {ref:"05891", name:"High-Precision PT100 Probe", min:-90, max:150, acc:0.15, price: 210, hum:false, img:"05891 High-precision PT100 probe.png", type:"analog"},
  {ref:"12366", name:"Precision T/H Industrial Enclosure", min:-30, max:70, acc:"±0.3°C / 2%RH", price: 285, hum:true, img:"12366 Precision TH transmitter – Industrial enclosure.png", type:"analog"},
  {ref:"12367", name:"Precision T/H Industrial Ambient", min:-30, max:70, acc:"±0.3°C / 2%RH", price: 285, hum:true, img:"12367 Precision TH transmitter – Industrial ambient.png", type:"analog"},
  {ref:"13264", name:"PT100 Industrial High-Temp", min:-50, max:700, acc:"Class A", price: 132, hum:false, img:"13264 PT100 high-temperature sensor for industrial.png", type:"analog"},
  {ref:"06154", name:"PT100 High-Temp (Bending Spring)", min:-50, max:450, acc:"Class A", price: 145, hum:false, img:"06154 PT100 high-temperature sensor with bending spring.png", type:"analog"},
  {ref:"05836", name:"PT100 Immersion Temperature Probe", min:-50, max:100, acc:"Class A", price: 85, hum:false, img:"05836 PT100 Immersion Temperature Probe.png", type:"analog"},
  {ref:"13357", name:"Thin PT100 Probe", min:-50, max:150, acc:"Class A", price: 105, hum:false, img:"13357 Thin PT100 probe.png", type:"analog"},
  {ref:"05936", name:"PT100 Penetration Probe", min:-50, max:150, acc:"Class A", price: 115, hum:false, img:"05936 PT100 Penetration Probe.png", type:"analog"}
];

const baseUnits = [
  // MODULAR UNITS
  {ref:"13756E", name:"Nova SPY Digital", tech:"nova", price: 166, img:"Nova SPY Digital.png", input:"digital"},
  {ref:"13491", name:"Nano SPY Digital (Legacy)", tech:"nano", price: 160, img:"Nano SPY Digital.png", input:"digital", legacy: true},
  {ref:"11809E", name:"LoRa SPY Digital", tech:"lora", price: 270, img:"LoRa SPY Digital.png", input:"digital"},
  {ref:"11571E", name:"Nano SPY U", tech:"nano", price: 245, img:"Nano SPY U.png", input:"analog"},
  {ref:"11810E", name:"LoRa SPY U", tech:"lora", price: 357, img:"LoRa SPY U.png", input:"analog"},

  // FIXED / INTEGRATED UNITS
  {ref:"13763E", name:"Nova SPY T Ambient", tech:"nova", price: 154, img:"Nova SPY T Ambient.png", input:"fixed", min:-40, max:80, acc:"±0.4°C", hum:false},
  {ref:"11567E", name:"Nano SPY T1", tech:"nano", price: 119, img:"Nano SPY T1.png", input:"fixed", min:-40, max:85, acc:"±0.4°C", hum:false},
  {ref:"11569E", name:"Nano SPY T2", tech:"nano", price: 217, img:"Nano SPY T2.png", input:"fixed", min:-50, max:105, acc:"±0.3°C", hum:false},
  {ref:"11568E", name:"Nano SPY TH", tech:"nano", price: 188, img:"Nano SPY TH.png", input:"fixed", min:-30, max:70, acc:"±0.4°C / 2%RH", hum:true},
  {ref:"11802E", name:"LoRa SPY T1", tech:"lora", price: 242, img:"LoRa SPY T1.png", input:"fixed", min:-30, max:70, acc:"±0.4°C", hum:false},
  {ref:"11806E", name:"LoRa SPY T3", tech:"lora", price: 518, img:"LoRa SPY T3.png", input:"fixed", min:-200, max:0, acc:"±0.2°C", hum:false}
];

function search(){
  const lang = document.querySelector('input[name="lang"]:checked').value;
  const unit = document.querySelector('input[name="unit"]:checked').value;
  let minI = parseFloat(document.getElementById("minTemp").value);
  let maxI = parseFloat(document.getElementById("maxTemp").value);
  const fMin = (unit === "F") ? fToC(minI) : minI;
  const fMax = (unit === "F") ? fToC(maxI) : maxI;
  const humReq = document.getElementById("humidity").value === "yes";
  const sTechs = Array.from(document.querySelectorAll('input[name="tech"]:checked')).map(cb => cb.value);

  let matches = [];
  baseUnits.forEach(base => {
    if (!sTechs.includes(base.tech)) return;
    if (base.input === "fixed") {
      if (base.min <= fMax && base.max >= fMin && (!humReq || base.hum)) {
        matches.push({ fullName: base.name, tech: base.tech, baseRef: base.ref, baseP: base.price, totalP: base.price, baseImg: base.img, min: base.min, max: base.max, acc: base.acc });
      }
    } else {
      probes.forEach(p => {
        if (p.type !== base.input) return; // Strict compatibility check
        if (p.novaOnly && base.tech !== 'nova') return;
        if (p.min <= fMax && p.max >= fMin && (!humReq || p.hum)) {
          matches.push({ fullName: `${base.name} + ${p.name}`, tech: base.tech, baseRef: base.ref, probeRef: p.ref, baseP: base.price, probeP: p.price, totalP: base.price + p.price, baseImg: base.img, probeImg: p.img, min: p.min, max: p.max, acc: p.acc, legacy: base.legacy });
        }
      });
    }
  });
  render(matches, unit, lang);
}

function render(matches, unit, lang) {
  const t = i18n[lang];
  document.getElementById("results").innerHTML = matches.map(m => {
    let dRange = (unit === "F") ? `${cToF(m.min).toFixed(0)} to ${cToF(m.max).toFixed(0)}°F` : `${m.min} to ${m.max}°C`;
    let dAcc = (typeof m.acc === 'number') ? (unit === "F" ? `±${accToF(m.acc).toFixed(2)}°F` : `±${m.acc}°C`) : m.acc;
    return `<div class="card"><div class="visual-header"><div class="img-wrap"><img src="${m.baseImg}"><span class="img-label">${t.recorder}</span></div>${m.probeImg ? `<div style="font-size:20px; color:#ccc;">+</div><div class="img-wrap"><img src="${m.probeImg}"><span class="img-label">${t.probe}</span></div>` : ''}</div><span class="tech-tag tag-${m.tech}">${m.tech.toUpperCase()}</span><b style="display:block; font-size:1rem; margin-bottom:5px;">${m.fullName}</b><div style="font-size:0.8rem; color:#666; margin-bottom:10px;">Ref: #${m.baseRef}${m.probeRef ? ' + #' + m.probeRef : ''}</div>${m.legacy ? `<div class="legacy-banner">${t.legacyWarn}</div>` : ''}<div class="breakdown"><div><b>${t.rangeInfo}</b> ${dRange}</div><div><b>${t.accInfo}</b> ${dAcc}</div><hr style="border:0; border-top:1px solid #eee; margin:8px 0;"><div style="display:flex; justify-content:space-between;"><span>${t.basePrice}</span> <span>$${m.baseP.toFixed(2)}</span></div>${m.probeP ? `<div style="display:flex; justify-content:space-between;"><span>${t.probePrice}</span> <span>$${m.probeP.toFixed(2)}</span></div>` : ''}<div class="total-row" style="display:flex; justify-content:space-between;"><span>${t.totalSystem}</span> <span>$${m.totalP.toFixed(2)} USD</span></div></div></div>`;
  }).join("");
}
search();
</script>
</body>
</html>
